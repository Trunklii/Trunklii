<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Plan — Studio</title>
<meta name="description" id="meta-desc" content="撮影プランの詳細"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;--off:#fff;--bg:#f8f6f2;--mid:#888078;
  --accent:#b8935a;--border:rgba(17,16,16,.1);
  --serif:'Noto Serif JP',serif;--display:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.8;overflow-x:hidden;opacity:0;transition:opacity .4s var(--ease)}
body.is-ready{opacity:1}
img{max-width:100%;display:block}
a{color:inherit}

.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(17,16,16,.12)}
.nav-top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 clamp(1rem,3vw,2.5rem);height:64px;gap:1rem}
.back-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--sans);font-weight:400;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.55rem .9rem;border:1px solid var(--ink);transition:background .2s,color .2s}
.back-link:hover{background:var(--ink);color:#fff}
.nav-brand{font-family:var(--display);font-style:italic;font-size:1.1rem;letter-spacing:.04em;text-align:center}
.nav-brand .b-mark{color:var(--accent);font-style:normal;font-weight:400}
.nav-right .booking-btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:400;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.6rem 1.1rem;transition:background .25s}
.nav-right .booking-btn:hover{background:var(--accent)}

main{padding-top:64px}

.pd-hero{position:relative;height:60vh;min-height:380px;max-height:560px;overflow:hidden;display:flex;align-items:flex-end}
.pd-hero-img{position:absolute;inset:0;background-size:cover;background-position:center}
.pd-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(17,16,16,0) 30%,rgba(17,16,16,.55) 100%)}
.pd-hero-text{position:relative;z-index:1;color:#fff;padding:0 clamp(1.4rem,5vw,4rem) clamp(2rem,5vw,3.5rem);max-width:920px}
.pd-hero-tag{font-family:var(--sans);font-weight:400;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;opacity:.85;margin-bottom:.9rem}
.pd-hero-name{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(2.2rem,5vw,3.6rem);line-height:1.15;margin-bottom:.5rem}
.pd-hero-tagline{font-family:var(--serif);font-weight:300;font-size:clamp(1rem,1.6vw,1.2rem);line-height:1.6;opacity:.92}

.pd-wrap{max-width:1100px;margin:0 auto;padding:clamp(2.5rem,6vw,4.5rem) clamp(1.4rem,5vw,3rem)}

.pd-about{max-width:760px;margin:0 auto 4rem;text-align:center}
.pd-about p{font-family:var(--serif);font-weight:300;font-size:1rem;line-height:2.05;color:var(--ink);white-space:pre-line}

.pd-variants-head{text-align:center;margin-bottom:2.2rem}
.pd-variants-head h2{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.8rem;color:var(--ink);margin-bottom:.4rem}
.pd-variants-head .pd-vh-sub{font-family:var(--sans);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid)}

.pd-variants{display:grid;gap:1.4rem;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));margin-bottom:3.5rem}
.pd-variant{background:#fff;border:1px solid var(--border);padding:2rem 1.7rem;display:flex;flex-direction:column;position:relative}
.pd-variant-label{font-family:var(--sans);font-weight:500;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:.5rem}
.pd-variant-name{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.45rem;line-height:1.2;margin-bottom:.8rem}
.pd-variant-price{font-family:var(--display);font-style:italic;font-weight:400;font-size:2rem;color:var(--accent);line-height:1;margin-bottom:.4rem}
.pd-variant-duration{font-family:var(--sans);font-weight:300;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);padding-bottom:1.2rem;margin-bottom:1.2rem;border-bottom:1px solid var(--border);min-height:1rem}
.pd-variant-desc{font-family:var(--serif);font-weight:300;font-size:.9rem;line-height:1.95;color:var(--ink);margin-bottom:1.5rem;white-space:pre-line}
.pd-sub-heading{font-family:var(--sans);font-weight:500;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);margin-bottom:.7rem;margin-top:.4rem}

.pd-list{list-style:none;margin-bottom:1.4rem}
.pd-list li{position:relative;padding:.45rem 0 .45rem 1.3rem;font-family:var(--serif);font-weight:300;font-size:.86rem;line-height:1.55;border-bottom:1px solid var(--border)}
.pd-list li::before{content:'';position:absolute;left:.15rem;top:.95rem;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.pd-list li:last-child{border-bottom:none}

.pd-options{display:grid;grid-template-columns:1fr auto;gap:0;margin-bottom:1.4rem}
.pd-options .opt-row{display:contents}
.pd-opt-name,.pd-opt-price{padding:.45rem 0;border-bottom:1px solid var(--border);font-family:var(--serif);font-weight:300;font-size:.86rem}
.pd-opt-price{text-align:right;color:var(--accent);font-family:var(--sans);font-weight:400}

.pd-vgallery{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:1.4rem}
.pd-vgallery img{aspect-ratio:1/1;width:100%;object-fit:cover;transition:transform .4s var(--ease)}
.pd-vgallery a{display:block;overflow:hidden;cursor:zoom-in}
.pd-vgallery a:hover img{transform:scale(1.06)}

.pd-variant-cta{margin-top:auto;padding-top:1rem}
.pd-variant-cta a{display:block;width:100%;text-align:center;font-family:var(--sans);font-weight:400;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.95rem 1rem;transition:background .25s}
.pd-variant-cta a:hover{background:var(--accent)}

.pd-notes{background:rgba(184,147,90,.07);border-left:3px solid var(--accent);padding:1.3rem 1.5rem;font-family:var(--serif);font-weight:300;font-size:.92rem;line-height:1.95;white-space:pre-line;color:var(--ink);max-width:760px;margin:0 auto}
.pd-notes-head{font-family:var(--sans);font-weight:500;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:.7rem}

.pd-cta{text-align:center;padding:3rem 1rem;margin-top:2.5rem;border-top:1px solid var(--border)}
.pd-cta-text{font-family:var(--display);font-style:italic;font-weight:300;font-size:1.5rem;margin-bottom:1.5rem}
.pd-cta-btn{display:inline-flex;align-items:center;gap:.6rem;font-family:var(--sans);font-weight:400;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:1rem 2.4rem;transition:background .25s}
.pd-cta-btn:hover{background:var(--accent)}

.pd-notfound{text-align:center;padding:6rem 1.4rem;font-family:var(--display);font-style:italic;font-size:1.4rem;color:var(--mid)}
.pd-notfound a{display:inline-block;margin-top:1.5rem;font-family:var(--sans);font-weight:400;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:.7rem 1.4rem;text-decoration:none;font-style:normal}
.pd-notfound a:hover{background:var(--ink);color:#fff}

footer{background:var(--ink);color:rgba(255,255,255,.6);padding:2rem clamp(1.4rem,5vw,3rem);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.2rem;font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.08em}
.footer-logo{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.1rem;color:#fff;letter-spacing:.04em;text-decoration:none}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;gap:1rem}
.footer-links a{color:rgba(255,255,255,.55);text-decoration:none;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-copy{font-size:.66rem;letter-spacing:.1em}

.lb{position:fixed;inset:0;background:rgba(17,16,16,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;z-index:300;padding:2rem}
.lb.open{opacity:1;pointer-events:auto}
.lb img{max-width:100%;max-height:100%;object-fit:contain}
.lb-close{position:absolute;top:1.2rem;right:1.2rem;width:40px;height:40px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:1.4rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}

@media(max-width:560px){
  .nav-top{height:56px;padding:0 .8rem;gap:.6rem}
  main{padding-top:56px}
  .back-link{padding:.45rem .7rem;font-size:.66rem;gap:.3rem}
  .nav-brand{font-size:.95rem}
  .nav-right .booking-btn{padding:.5rem .8rem;font-size:.62rem;letter-spacing:.1em}
  .pd-hero{height:46vh;min-height:280px}
  .pd-variants{grid-template-columns:1fr;gap:1rem}
  .pd-variant{padding:1.6rem 1.3rem}
  .pd-variant-name{font-size:1.3rem}
  .pd-variant-price{font-size:1.7rem}
  .pd-variants-head h2{font-size:1.5rem}
  .pd-about p{font-size:.95rem}
  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-top">
    <a href="plans.html" class="back-link"><span>‹</span> <span>Plans</span></a>
    <div class="nav-brand" id="nav-brand">Studio <span class="b-mark">·</span></div>
    <div class="nav-right">
      <a href="#" class="booking-btn" id="booking-btn">予約する</a>
    </div>
  </div>
</nav>

<main id="main"><div id="content"></div></main>

<footer>
  <a href="../" class="footer-logo">TRUNKLII</a>
  <ul class="footer-links">
    <li><a href="./">Top</a></li>
    <li><a href="plans.html">Plans</a></li>
    <li><a href="./#calendar">Calendar</a></li>
    <li><a href="./#reservation">Reservation</a></li>
    <li><a href="./#cancel-policy">Cancel Policy</a></li>
  </ul>
  <span class="footer-copy" id="footer-copy"></span>
</footer>

<div class="lb" id="lb" onclick="if(event.target===this)closeLb()">
  <button class="lb-close" onclick="closeLb()" aria-label="閉じる">×</button>
  <img id="lb-img" src="" alt=""/>
</div>

<script src="../site-data.js"></script>
<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function getParam(name){ return new URLSearchParams(location.search).get(name); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function renderNotFound(reason){
  document.getElementById('content').innerHTML = `
    <div class="pd-notfound">
      <div>${esc(reason || 'プランが見つかりませんでした')}</div>
      <a href="plans.html">プラン一覧に戻る</a>
    </div>`;
  document.body.classList.add('is-ready');
}

function render(){
  const data = window.SITE_DATA;
  if(!data) return renderNotFound('データを読み込めませんでした');
  const studio = data.studios[STUDIO_KEY];
  if(!studio) return renderNotFound();

  if(studio.accentColor){
    document.documentElement.style.setProperty('--accent', studio.accentColor);
  }

  const brandEl = document.getElementById('nav-brand');
  brandEl.innerHTML = `${esc((studio.shortName||'').replace(/\.$/,''))}<span class="b-mark">.</span>`;
  const bookingBtn = document.getElementById('booking-btn');
  bookingBtn.href = studio.bookingUrl || '#';
  bookingBtn.textContent = studio.bookingLabel || '予約する';
  document.getElementById('footer-copy').textContent = data.global.copyright;

  const key = getParam('key');
  if(!key) return renderNotFound('プランが指定されていません');
  const plan = (studio.plans || []).find(p=>p.key===key);
  if(!plan) return renderNotFound('指定されたプランが見つかりませんでした');

  if(!plan.detail || !plan.variants || plan.variants.length === 0){
    document.getElementById('page-title').textContent = `${plan.name} — ${studio.name}`;
    document.getElementById('content').innerHTML = `
      <div class="pd-notfound">
        <div>${esc(plan.name)} の詳細は近日公開予定です</div>
        <a href="plans.html">プラン一覧へ戻る</a>
      </div>`;
    document.body.classList.add('is-ready');
    return;
  }

  const d = plan.detail;
  document.getElementById('page-title').textContent = `${plan.name} | ${studio.name}`;
  document.getElementById('meta-desc').setAttribute('content',
    `${plan.name} — ${d.tagline || plan.desc || ''} ${studio.name}の撮影プラン詳細。`);

  const variantsHtml = plan.variants.map(v=>{
    const includes = (v.includes||[]).map(it=>`<li>${esc(it)}</li>`).join('');
    const options = (v.options||[]).map(o=>`
      <div class="opt-row">
        <div class="pd-opt-name">${esc(o.name)}</div>
        <div class="pd-opt-price">${esc(o.price)}</div>
      </div>`).join('');
    const gallery = (v.gallery||[]).map((g,i)=>`
      <a href="javascript:void(0)" onclick="openLb('${esc(g)}')"><img src="${esc(g)}" alt="${esc(plan.name)} ${esc(v.label)} ${i+1}" loading="lazy"/></a>
    `).join('');
    return `
      <article class="pd-variant">
        <div class="pd-variant-label">${esc(v.cuts != null ? v.cuts + ' cuts' : 'Variant')}</div>
        <div class="pd-variant-name">${esc(v.label)}</div>
        <div class="pd-variant-price">${esc(v.price)}</div>
        ${v.duration?`<div class="pd-variant-duration">撮影時間 ${esc(v.duration)}</div>`:'<div class="pd-variant-duration"></div>'}
        ${v.description?`<div class="pd-variant-desc">${esc(v.description)}</div>`:''}
        ${includes?`<div class="pd-sub-heading">Includes</div><ul class="pd-list">${includes}</ul>`:''}
        ${options?`<div class="pd-sub-heading">Options</div><div class="pd-options">${options}</div>`:''}
        ${gallery?`<div class="pd-sub-heading">Gallery</div><div class="pd-vgallery">${gallery}</div>`:''}
        <div class="pd-variant-cta"><a href="${esc(studio.bookingUrl||'#')}">このプランで予約する →</a></div>
      </article>
    `;
  }).join('');

  const heroImg = d.heroImage || '';

  document.getElementById('content').innerHTML = `
    <section class="pd-hero">
      ${heroImg?`<div class="pd-hero-img" style="background-image:url('${esc(heroImg)}')"></div>`:''}
      <div class="pd-hero-text">
        <div class="pd-hero-tag">${esc(plan.tag || 'Plan')}</div>
        <h1 class="pd-hero-name">${esc(plan.name)}</h1>
        ${d.tagline?`<div class="pd-hero-tagline">${esc(d.tagline)}</div>`:''}
      </div>
    </section>

    <div class="pd-wrap">
      ${d.longDescription?`
        <section class="pd-about">
          <p>${esc(d.longDescription)}</p>
        </section>`:''}

      <div class="pd-variants-head">
        <h2>Choose your plan</h2>
        <div class="pd-vh-sub">カット数からお選びください</div>
      </div>

      <div class="pd-variants">${variantsHtml}</div>

      ${d.notes?`
        <div class="pd-notes">
          <div class="pd-notes-head">Notes</div>${esc(d.notes)}
        </div>`:''}

      <div class="pd-cta">
        <div class="pd-cta-text">ご予約・お問い合わせ</div>
        <a href="${esc(studio.bookingUrl||'#')}" class="pd-cta-btn">予約フォームへ →</a>
      </div>
    </div>
  `;

  document.body.classList.add('is-ready');
}

function openLb(src){
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('open');
}
function closeLb(){ document.getElementById('lb').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLb(); });
setTimeout(()=>document.body.classList.add('is-ready'), 1200);
render();
</script>
</body>
</html>
