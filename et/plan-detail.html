<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#2b2825;--off:#fff;--bg:#f8f6f2;--mid:#888078;
  --accent:#b8935a;--border:rgba(17,16,16,.1);
  --serif:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic Medium','YuGothic',sans-serif;--display:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic Medium','YuGothic',sans-serif;--sans:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic Medium','YuGothic',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.8;overflow-x:hidden;opacity:0;transition:opacity .4s var(--ease)}
body.is-ready{opacity:1}
img{max-width:100%;display:block}
a{color:inherit}

/* ─── Shared design tokens (index.html と統一) ─── */
.wrap{max-width:1440px;margin:0 auto;padding:clamp(4rem,10vw,9rem) clamp(1.5rem,5vw,5rem)}
.sec-head{display:flex;align-items:baseline;gap:1.2rem;margin-bottom:clamp(2rem,4vw,3.5rem)}
.sec-num{font-family:var(--sans);font-weight:300;font-size:.62rem;letter-spacing:.22em;color:var(--mid)}
.sec-title{font-family:'Noto Sans JP',var(--display);font-weight:300;font-style:normal;font-size:clamp(1.45rem,3.6vw,2.4rem);letter-spacing:.05em}
.sec-rule{flex:1;height:1px;background:var(--border);min-width:20px}
.section-body-text{font-family:var(--serif);font-weight:300;font-size:.9rem;color:var(--mid);line-height:2.1;white-space:pre-line;margin-bottom:2.5rem}
.btn-line{display:inline-block;font-family:var(--sans);font-weight:400;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:.85rem 2rem;text-decoration:none;transition:all .3s;cursor:pointer}
.btn-line:hover{background:var(--ink);color:#fff}
.btn-line.filled{background:var(--ink);color:#fff}
.btn-line.filled:hover{background:var(--accent);border-color:var(--accent)}
.more-cta{display:flex;justify-content:center;margin-top:3rem}

/* ─── Nav ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(17,16,16,.12)}
.nav-top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 clamp(1rem,3vw,2.5rem);height:64px;gap:1rem}
.back-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.55rem .9rem;border:1px solid var(--ink);transition:background .2s,color .2s}
.back-link:hover{background:var(--ink);color:#fff}
.nav-brand{font-family:var(--display);font-style:normal;font-weight:300;font-size:1.1rem;letter-spacing:.04em;text-align:center}
.nav-brand .b-mark{color:var(--accent);font-style:normal;font-weight:400}
.nav-right .booking-btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.6rem 1.1rem;transition:background .25s}
.nav-right .booking-btn:hover{background:var(--accent)}

main{padding-top:64px}

/* ─── Hero ─── */
.pd-hero{position:relative;width:100%;min-height:clamp(360px,55vh,560px);background:var(--ink);overflow:hidden;display:flex;align-items:flex-end}
.pd-hero-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.6}
.pd-hero-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(17,16,16,.1) 0%,rgba(17,16,16,.7) 100%)}
.pd-hero-text{position:relative;z-index:2;color:#fff;padding:clamp(2.5rem,6vw,5rem) clamp(1.5rem,5vw,5rem);max-width:1440px;margin:0 auto;width:100%}
.pd-hero-tag{font-family:var(--sans);font-weight:400;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:.9rem}
.pd-hero-name{font-family:var(--display);font-style:normal;font-weight:300;font-size:clamp(2.4rem,7vw,5rem);line-height:1.05;letter-spacing:-.01em;margin-bottom:.7rem}
.pd-hero-tagline{font-family:var(--display);font-style:normal;font-weight:300;font-size:clamp(.85rem,1.6vw,1.05rem);letter-spacing:.1em;color:rgba(255,255,255,.75)}

/* ─── About ─── */
.pd-about{max-width:780px;margin:0 auto 4rem}
.pd-about p{font-family:var(--serif);font-weight:300;font-size:.95rem;line-height:2.15;color:var(--ink);white-space:pre-line}

/* ─── Variants ─── */
.pd-variants{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1px;background:var(--border);margin-bottom:3rem}
.pd-variant{background:#fff;padding:2.4rem 2rem;display:flex;flex-direction:column;position:relative}
.pd-variant-label{font-family:var(--sans);font-weight:500;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem}
.pd-variant-name{font-family:var(--sans);font-weight:400;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);margin-bottom:.8rem}
.pd-variant-price{font-family:var(--display);font-style:normal;font-weight:400;font-size:1.7rem;color:var(--accent);margin-bottom:.5rem;line-height:1}
.pd-variant-duration{font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:1.4rem;min-height:.7rem}
.pd-variant-desc{font-family:var(--serif);font-weight:300;font-size:.85rem;line-height:1.95;color:var(--ink);margin-bottom:1.6rem;padding-bottom:1.4rem;border-bottom:1px solid var(--border)}

.pd-sub-heading{font-family:var(--sans);font-weight:500;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);margin:1.4rem 0 .8rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}

.pd-list{list-style:none;margin:0}
.pd-list li{font-family:var(--serif);font-weight:300;font-size:.82rem;line-height:1.85;color:var(--ink);padding:.3rem 0;position:relative;padding-left:1rem}
.pd-list li::before{content:'─';position:absolute;left:0;color:var(--accent)}

.pd-options{display:flex;flex-direction:column;gap:.5rem}
.opt-row{display:flex;justify-content:space-between;align-items:baseline;padding:.55rem 0;border-bottom:1px dotted var(--border);font-family:var(--sans)}
.pd-opt-name{font-family:var(--serif);font-weight:300;font-size:.82rem;color:var(--ink)}
.pd-opt-price{font-family:var(--display);font-style:normal;font-weight:400;font-size:.95rem;color:var(--accent);white-space:nowrap;margin-left:1rem}

.pd-vgallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:.6rem}
.pd-vgallery a{display:block;overflow:hidden;cursor:pointer}
.pd-vgallery img{width:100%;aspect-ratio:1/1;object-fit:cover;transition:transform .5s var(--ease)}
.pd-vgallery a:hover img{transform:scale(1.05)}

.pd-variant-cta{margin-top:auto;padding-top:1.8rem}
.pd-variant-cta a{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--sans);font-weight:500;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.55rem 0;border-bottom:1px solid var(--ink);transition:gap .25s,color .25s,border-color .25s}
.pd-variant-cta a:hover{gap:.7rem;color:var(--accent);border-bottom-color:var(--accent)}

/* ─── Variants head (above the grid) ─── */
.pd-variants-head{margin-bottom:2rem;text-align:center}
.pd-variants-head h2{font-family:var(--display);font-style:normal;font-weight:300;font-size:clamp(1.4rem,3.5vw,2rem);margin-bottom:.4rem}
.pd-vh-sub{font-family:var(--sans);font-weight:300;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mid)}

/* ─── Notes ─── */
.pd-notes{max-width:780px;margin:0 auto 3rem;padding:1.8rem 2rem;background:#fff;border:1px solid var(--border);font-family:var(--serif);font-weight:300;font-size:.88rem;line-height:2.05;color:var(--ink);white-space:pre-line}
.pd-notes-head{font-family:var(--sans);font-weight:500;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem}

/* ─── Final CTA ─── */
.pd-cta{text-align:center;padding:3rem 0 1rem}
.pd-cta-text{font-family:var(--display);font-style:normal;font-weight:300;font-size:clamp(1.2rem,2.8vw,1.7rem);margin-bottom:1.5rem;color:var(--ink)}

/* ─── Not found ─── */
.pd-notfound{text-align:center;padding:clamp(4rem,10vw,8rem) 1.5rem;font-family:var(--serif);font-size:.9rem;color:var(--mid)}
.pd-notfound div{margin-bottom:1.5rem;font-family:var(--display);font-style:normal;font-size:1.2rem}
.pd-notfound a{display:inline-block;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.75rem 1.8rem;border:1px solid var(--ink);transition:all .3s}
.pd-notfound a:hover{background:var(--ink);color:#fff}

/* ─── Lightbox ─── */
.lb{position:fixed;inset:0;background:rgba(17,16,16,.94);z-index:300;display:none;align-items:center;justify-content:center;padding:2rem}
.lb.open{display:flex}
.lb img{max-width:100%;max-height:90vh;object-fit:contain}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;line-height:1;padding:.5rem}

/* ─── Footer ─── */
footer{border-top:1px solid var(--border);background:#fff;color:var(--mid);padding:2rem clamp(1.5rem,5vw,4rem);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.2rem;font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.08em}
.footer-logo{font-family:var(--sans);font-weight:300;font-size:.85rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink);text-decoration:none}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;gap:1rem}
.footer-links a{color:var(--mid);text-decoration:none;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.footer-links a:hover{color:var(--ink)}
.footer-copy{font-size:.66rem;letter-spacing:.1em}.footer-logo{order:1}.footer-copy{order:2}.footer-links{order:3;flex-basis:100%;justify-content:center;margin:.2rem 0}

@media(max-width:700px){
  .nav-top{height:56px;padding:0 .8rem;gap:.6rem}
  main{padding-top:56px}
  .back-link{padding:.45rem .7rem;font-size:.66rem}
  .nav-brand{font-size:.95rem}
  .nav-right .booking-btn{padding:.5rem .8rem;font-size:.62rem}
  .pd-hero{min-height:280px}
  .pd-variant{padding:1.8rem 1.3rem}
  .pd-vgallery{grid-template-columns:repeat(2,1fr)}
  .sec-head{gap:.8rem}
  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
}
/* 料金・数字表示はライニング数字で高さを揃える（Cormorantのオールドスタイル数字対策） */
.plan-price,.item-price,.pd-variant-price,.pd-opt-price,.omairi-base-val,.omairi-table td.price-cell,.cp-table td.fee,.chip .p,.numctl .v,.total-bar .amt,.cal-month-name{font-variant-numeric:lining-nums;font-feature-settings:'lnum' 1}
</style>
<style>

<style>
/* ─── TOPページ準拠のヘッダー/フッターUI ─── */
.nav-brand-logo{display:flex;align-items:center;justify-content:center;color:var(--ink);text-decoration:none}
.icon-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;color:var(--ink);text-decoration:none;border:1px solid var(--ink);background:transparent;cursor:pointer;transition:background .2s,color .2s;padding:0;flex-shrink:0}

<style>

<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function getParam(name){ return new URLSearchParams(location.search).get(name); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function renderNotFound(reason){
  document.getElementById('content').innerHTML = `
    <div class="pd-notfound">
      <div>${esc(reason || 'プランが見つかりませんでした')}</div>
      <a href="plans.html">プラン一覧に戻る</a>
    </div>`;
  document.body.classList.add('is-ready');
}

function render(){
  const data = window.SITE_DATA;
  if(!data) return renderNotFound('データを読み込めませんでした');
  const studio = data.studios[STUDIO_KEY];
  if(!studio) return renderNotFound();

  if(studio.accentColor){
    document.documentElement.style.setProperty('--accent', studio.accentColor);
  }

  const brandEl = document.getElementById('nav-brand');
  brandEl.innerHTML = `${esc((studio.shortName||'').replace(/\.$/,''))}<span class="b-mark">.</span>`;
  document.getElementById('footer-copy').textContent = data.global.copyright;

  const key = getParam('key');
  if(!key) return renderNotFound('プランが指定されていません');
  const plan = (studio.plans || []).find(p=>p.key===key);
  if(!plan) return renderNotFound('指定されたプランが見つかりませんでした');

  if(!plan.detail || !plan.variants || plan.variants.length === 0){
    document.getElementById('page-title').textContent = `${plan.name} — ${studio.name}`;
    document.getElementById('content').innerHTML = `
      <div class="pd-notfound">
        <div>${esc(plan.name)} の詳細は近日公開予定です</div>
        <a href="plans.html">プラン一覧へ戻る</a>
      </div>`;
    document.body.classList.add('is-ready');
    return;
  }

  const d = plan.detail;
  document.getElementById('page-title').textContent = `${plan.name} | ${studio.name}`;
  const metaDesc = document.getElementById('meta-desc') || document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content',
    `${plan.name} — ${d.tagline || plan.desc || ''} ${studio.name}の撮影プラン詳細。`);

  const variantsHtml = plan.variants.map(v=>{
    const includes = (v.includes||[]).map(it=>`<li>${esc(it)}</li>`).join('');
    const options = (v.options||[]).map(o=>`
      <div class="opt-row">
        <div class="pd-opt-name">${esc(o.name)}</div>
        <div class="pd-opt-price">${esc(o.price)}</div>
      </div>`).join('');
    const gallery = (v.gallery||[]).map((g,i)=>`
      <a href="javascript:void(0)" onclick="openLb('${esc(g)}')"><img src="${esc(g)}" alt="${esc(plan.name)} ${esc(v.label)} ${i+1}" loading="lazy"/></a>
    `).join('');
    return `
      <article class="pd-variant">
        <div class="pd-variant-label">${esc(v.cuts != null ? v.cuts + ' cuts' : 'Variant')}</div>
        <div class="pd-variant-name">${esc(v.label)}</div>
        <div class="pd-variant-price">${esc(v.price)}</div>
        ${v.duration?`<div class="pd-variant-duration">撮影時間 ${esc(v.duration)}</div>`:'<div class="pd-variant-duration"></div>'}
        ${v.description?`<div class="pd-variant-desc">${esc(v.description)}</div>`:''}
        ${includes?`<div class="pd-sub-heading">Includes</div><ul class="pd-list">${includes}</ul>`:''}
        ${options?`<div class="pd-sub-heading">Options</div><div class="pd-options">${options}</div>`:''}
        ${gallery?`<div class="pd-sub-heading">Gallery</div><div class="pd-vgallery">${gallery}</div>`:''}
        <div class="pd-variant-cta"><a href="${esc(studio.bookingUrl||'#')}">このプランで予約する →</a></div>
      </article>
    `;
  }).join('');

  const heroImg = d.heroImage || '';

  document.getElementById('content').innerHTML = `
    <section class="pd-hero">
      ${heroImg?`<div class="pd-hero-img" style="background-image:url('${esc(heroImg)}')"></div>`:''}
      <div class="pd-hero-text">
        <div class="pd-hero-tag">${esc(plan.tag || 'Plan')}</div>
        <h1 class="pd-hero-name">${esc(plan.name)}</h1>
        ${d.tagline?`<div class="pd-hero-tagline">${esc(d.tagline)}</div>`:''}
      </div>
    </section>

    <section>
      <div class="wrap">

        ${d.longDescription?`
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2 class="sec-title">About this plan</h2><span class="sec-jp">このプランについて</span>
            <div class="sec-rule"></div>
          </div>
          <div class="pd-about"><p>${esc(d.longDescription)}</p></div>
        `:''}

        <div class="sec-head">
          <span class="sec-num">02</span>
          <h2 class="sec-title">Choose your plan</h2><span class="sec-jp">プランを選ぶ</span>
          <div class="sec-rule"></div>
        </div>
        <p class="section-body-text" style="text-align:center;max-width:560px;margin:0 auto 3rem">カット数からお選びください。</p>

        <div class="pd-variants">${variantsHtml}</div>

        ${d.notes?`
          <div class="sec-head" style="margin-top:4rem">
            <span class="sec-num">03</span>
            <h2 class="sec-title">Notes</h2><span class="sec-jp">ご注意事項</span>
            <div class="sec-rule"></div>
          </div>
          <div class="pd-notes">
            <div class="pd-notes-head">ご利用にあたって</div>${esc(d.notes)}
          </div>
        `:''}

        <div class="pd-cta">
          <div class="pd-cta-text">ご予約・お問い合わせ</div>
          <div class="hdr-book-wrap"><button class="hdr-book-toggle" type="button" onclick="toggleHdrBook(event)" aria-haspopup="true" aria-expanded="false">予約する<span class="hdr-book-chev" aria-hidden="true">›</span></button><div class="hdr-book-menu" hidden><a class="bb-btn bb-et" href="https://studio-et.stores.jp/reserve/hashima/733693" target="_blank" rel="noopener"><span class="bb-logo" role="img" aria-label="Studio et." style="aspect-ratio:404/248;-webkit-mask:url(../assets/et-logo-mark-white.png) center/contain no-repeat;mask:url(../assets/et-logo-mark-white.png) center/contain no-repeat"></span><span class="bb-cta">予約する<span aria-hidden="true">→</span></span></a><a class="bb-btn bb-nr" href="https://www.instagram.com/maison_nr._" target="_blank" rel="noopener"><span class="bb-logo" role="img" aria-label="Maison nr." style="aspect-ratio:572/267;-webkit-mask:url(../assets/nr-logo-mark-white.png) center/contain no-repeat;mask:url(../assets/nr-logo-mark-white.png) center/contain no-repeat"></span><span class="bb-cta">予約する<span aria-hidden="true">→</span></span></a></div></div>
        </div>

      </div>
    </section>
  `;

  document.body.classList.add('is-ready');
}

function openLb(src){
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('open');
}
function closeLb(){ document.getElementById('lb').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLb(); });
setTimeout(()=>document.body.classList.add('is-ready'), 1200);
render();
</script>
<script>
// 予約する › 展開メニュー(TOPページと同仕様)
function toggleHdrBook(e){
  e.stopPropagation();
  const wrap = e.currentTarget.closest('.hdr-book-wrap');
  const m = wrap.querySelector('.hdr-book-menu');
  const open = m.hidden;
  document.querySelectorAll('.hdr-book-menu').forEach(x=>{ x.hidden = true; });
  document.querySelectorAll('.hdr-book-toggle').forEach(b=>b.setAttribute('aria-expanded','false'));
  m.hidden = !open;
  e.currentTarget.setAttribute('aria-expanded', open ? 'true' : 'false');
}
(function(){
  function closeIfOutside(ev){
    if(!(ev.target instanceof Element) || !ev.target.closest('.hdr-book-wrap')){
      document.querySelectorAll('.hdr-book-menu').forEach(x=>{ x.hidden = true; });
      document.querySelectorAll('.hdr-book-toggle').forEach(b=>b.setAttribute('aria-expanded','false'));
    }
  }
  document.addEventListener('pointerdown', closeIfOutside, {capture:true, passive:true});
  document.addEventListener('touchstart', closeIfOutside, {capture:true, passive:true});
  // ヘッダーのマップ/Instagram リンクを site-data から設定
  var key = location.pathname.includes('/nr/') ? 'nr' : 'et';
  var d = (window.SITE_DATA && SITE_DATA.studios) ? SITE_DATA.studios[key] : null;
  if(d){
    var m=document.getElementById('sub-map'); if(m && d.mapUrl) m.href=d.mapUrl;
    var g=document.getElementById('sub-ig'); if(g && d.instagram) g.href=d.instagram;
  }
})();
</script>
<script>
// フロート: トップへ戻る + 予約シート開閉(TOPページ準拠)
(function(){
  var b=document.getElementById('to-top-btn');
  if(b){ window.addEventListener('scroll', function(){ b.classList.toggle('show', window.scrollY>400); }, {passive:true}); }
})();
function openBookSheet(){
  var s=document.getElementById('book-sheet'); if(s) s.hidden=false;
  document.body.classList.add('sheet-open');
  var t=document.getElementById('book-toggle'); if(t) t.hidden=true;
}
function closeBookSheet(){
  var s=document.getElementById('book-sheet'); if(s) s.hidden=true;
  document.body.classList.remove('sheet-open');
  var t=document.getElementById('book-toggle'); if(t) t.hidden=false;
}
</script>
