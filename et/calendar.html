<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Calendar — Studio</title>
<meta name="description" content="撮影カレンダー・料金目安"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;--off:#fff;--bg:#f8f6f2;--mid:#888078;
  --accent:#b8935a;--border:rgba(17,16,16,.1);
  --serif:'Noto Serif JP',serif;--display:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --tier-a:#f0c8a0;--tier-b:#b8cfe8;--tier-c:#f4b0bc;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.8;overflow-x:hidden;opacity:0;transition:opacity .4s var(--ease)}
body.is-ready{opacity:1}
img{max-width:100%;display:block}
a{color:inherit}

.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(17,16,16,.12)}
.nav-top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 clamp(1rem,3vw,2.5rem);height:64px;gap:1rem}
.back-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--sans);font-weight:400;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.55rem .9rem;border:1px solid var(--ink);transition:background .2s,color .2s}
.back-link:hover{background:var(--ink);color:#fff}
.nav-brand{font-family:var(--display);font-style:italic;font-size:1.1rem;letter-spacing:.04em;text-align:center}
.nav-brand .b-mark{color:var(--accent);font-style:normal;font-weight:400}
.nav-right .booking-btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:400;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.6rem 1.1rem;transition:background .25s}
.nav-right .booking-btn:hover{background:var(--accent)}

main{padding-top:64px}

.pg-head{text-align:center;padding:clamp(3rem,7vw,5rem) 1.5rem 2rem}
.pg-sub{font-family:var(--sans);font-weight:400;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);margin-bottom:1.1rem}
.pg-head h1{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(2.2rem,5vw,3.2rem);line-height:1.1;margin-bottom:1rem}
.pg-lead{font-family:var(--serif);font-weight:300;font-size:.92rem;line-height:2;max-width:560px;margin:0 auto;color:var(--ink)}

/* ─── Tier Legend ─── */
.tier-legend{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;padding:0 1.5rem 2.5rem}
.tier-item{display:flex;align-items:center;gap:.7rem;font-family:var(--sans);font-weight:400;font-size:.8rem;letter-spacing:.06em}
.tier-dot{display:inline-block;width:20px;height:8px;border-radius:2px;flex-shrink:0}
.tier-a .tier-dot{background:var(--tier-a)}
.tier-b .tier-dot{background:var(--tier-b)}
.tier-c .tier-dot{background:var(--tier-c)}
.tier-label{font-weight:500;font-size:.82rem}
.tier-price{color:var(--ink);font-weight:400}
.tier-days{color:var(--mid);font-size:.72rem}

/* ─── Calendar Grid ─── */
.cal-wrap{max-width:1060px;margin:0 auto;padding:0 clamp(1rem,4vw,2.5rem) 1rem}
.cal-months{display:grid;grid-template-columns:1fr 1fr;gap:2rem 3rem}
.cal-month{}
.cal-month-hd{display:flex;align-items:baseline;gap:.75rem;margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.cal-month-name{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.4rem;letter-spacing:.02em}
.cal-month-year{font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.14em;color:var(--mid);text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-family:var(--sans);font-weight:400;font-size:.6rem;letter-spacing:.1em;text-align:center;padding:.4rem 0;color:var(--mid)}
.cal-dow.sun{color:#c0382e}
.cal-dow.sat{color:#2e6fc0}
.cal-day{position:relative;text-align:center;padding:.55rem .2rem .3rem;font-family:var(--sans);font-weight:300;font-size:.8rem;min-height:2.8rem;background:#fff;cursor:default}
.cal-day.empty{background:transparent}
.cal-day.other-month{opacity:.3;background:#f0ece6}
.cal-day.sun-col{color:#c0382e}
.cal-day.sat-col{color:#2e6fc0}
.cal-day.holiday{color:#c0382e;font-weight:400}
.cal-day::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px}
.cal-day.tier-a::after{background:var(--tier-a)}
.cal-day.tier-b::after{background:var(--tier-b)}
.cal-day.tier-c::after{background:var(--tier-c)}
.cal-day.today{outline:2px solid var(--accent);outline-offset:-2px}
.cal-day.closed{opacity:.45;text-decoration:line-through}

/* ─── Notes ─── */
.cal-notes{max-width:700px;margin:2rem auto 0;padding:0 1.5rem 1.5rem;text-align:center}
.cal-note{font-family:var(--serif);font-weight:300;font-size:.82rem;line-height:2;color:var(--mid);margin-bottom:.4rem}

/* ─── CTA ─── */
.cal-cta{text-align:center;padding:2.5rem 1.5rem 4rem}
.btn-fill{display:inline-flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:400;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.85rem 2.4rem;transition:background .25s}
.btn-fill:hover{background:var(--accent)}

footer{background:var(--ink);color:rgba(255,255,255,.6);padding:2rem clamp(1.4rem,5vw,3rem);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.2rem;font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.08em}
.footer-logo{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.1rem;color:#fff;letter-spacing:.04em;text-decoration:none}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;gap:1rem}
.footer-links a{color:rgba(255,255,255,.55);text-decoration:none;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-copy{font-size:.66rem;letter-spacing:.1em}

@media(max-width:700px){
  .cal-months{grid-template-columns:1fr;gap:2rem}
  .nav-top{height:56px;padding:0 .8rem;gap:.6rem}
  main{padding-top:56px}
  .back-link{padding:.45rem .7rem;font-size:.66rem}
  .nav-brand{font-size:.95rem}
  .nav-right .booking-btn{padding:.5rem .8rem;font-size:.62rem}
  .tier-legend{gap:1.2rem}
  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-top">
    <a href="./" class="back-link"><span>‹</span> <span>Top</span></a>
    <div class="nav-brand" id="nav-brand">Studio <span class="b-mark">·</span></div>
    <div class="nav-right">
      <a href="#" class="booking-btn" id="booking-btn">予約する</a>
    </div>
  </div>
</nav>

<main>
  <header class="pg-head">
    <div class="pg-sub">Calendar</div>
    <h1 id="page-h1">撮影カレンダー</h1>
    <p class="pg-lead" id="page-lead">撮影可能日をご確認ください。<br/>お日にちにより撮影料金が異なります。</p>
  </header>

  <div class="tier-legend">
    <div class="tier-item tier-a"><span class="tier-dot"></span><span class="tier-label">A</span><span class="tier-price">¥6,600</span><span class="tier-days">平日</span></div>
    <div class="tier-item tier-b"><span class="tier-dot"></span><span class="tier-label">B</span><span class="tier-price">¥8,800</span><span class="tier-days">土曜</span></div>
    <div class="tier-item tier-c"><span class="tier-dot"></span><span class="tier-label">C</span><span class="tier-price">¥9,900</span><span class="tier-days">日曜・祝日</span></div>
  </div>

  <div class="cal-wrap">
    <div class="cal-months" id="cal-months"></div>
  </div>

  <div class="cal-notes">
    <p class="cal-note" id="cal-note-main">定休日：火曜日 / 撮影は完全予約制となっております。</p>
    <p class="cal-note">※表示の料金はスタジオ使用料（撮影費別）です。詳細はプランページをご確認ください。</p>
    <p class="cal-note">※祝日・大型連休はC料金となります。</p>
  </div>

  <div class="cal-cta">
    <a href="#" class="btn-fill" id="cta-btn">ご予約はこちら</a>
  </div>
</main>

<footer>
  <a href="../" class="footer-logo">TRUNKLII</a>
  <ul class="footer-links">
    <li><a href="./">Top</a></li>
    <li><a href="./plans.html">Plans</a></li>
    <li><a href="./reservation.html">Reservation</a></li>
    <li><a href="./cancel-policy.html">Cancel Policy</a></li>
  </ul>
  <span class="footer-copy" id="footer-copy"></span>
</footer>

<script src="../site-data.js"></script>
<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* 日本の祝日（2025〜2026） */
const JP_HOLIDAYS = new Set([
  '2025-01-01','2025-01-13',
  '2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20',
  '2025-04-29',
  '2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21',
  '2025-08-11',
  '2025-09-15','2025-09-23',
  '2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12',
  '2026-02-11','2026-02-23',
  '2026-03-20',
  '2026-04-29',
  '2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20',
  '2026-08-11',
  '2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12',
  '2026-11-03','2026-11-23',
]);

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function getTier(y, m, d){
  const dow = new Date(y, m, d).getDay(); // 0=Sun,6=Sat
  const key = dateKey(y, m, d);
  if(dow === 0 || JP_HOLIDAYS.has(key)) return 'c';
  if(dow === 6) return 'b';
  if(dow === 2) return 'closed'; // 火曜=定休日
  return 'a';
}

function renderMonth(year, month){
  const MONTHS_JA = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  const startCol = firstDow === 0 ? 6 : firstDow - 1; // 月曜始まりに調整
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let cells = '';
  // 前月の空白
  for(let i = 0; i < startCol; i++){
    cells += `<div class="cal-day empty"></div>`;
  }
  // 今月の日付
  for(let d = 1; d <= daysInMonth; d++){
    const dow = new Date(year, month, d).getDay();
    const key = dateKey(year, month, d);
    const tier = getTier(year, month, d);
    let cls = `cal-day tier-${tier}`;
    if(dow === 0) cls += ' sun-col';
    if(dow === 6) cls += ' sat-col';
    if(JP_HOLIDAYS.has(key) && dow !== 0) cls += ' holiday';
    if(key === todayKey) cls += ' today';
    cells += `<div class="${esc(cls)}">${d}</div>`;
  }

  return `
    <div class="cal-month">
      <div class="cal-month-hd">
        <span class="cal-month-name">${esc(MONTHS_JA[month])}</span>
        <span class="cal-month-year">${year}</span>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">月</div>
        <div class="cal-dow">火</div>
        <div class="cal-dow">水</div>
        <div class="cal-dow">木</div>
        <div class="cal-dow">金</div>
        <div class="cal-dow sat">土</div>
        <div class="cal-dow sun">日</div>
        ${cells}
      </div>
    </div>
  `;
}

function renderCalendar(){
  const now = new Date();
  let y = now.getFullYear();
  let m = now.getMonth();
  let html = '';
  for(let i = 0; i < 6; i++){
    html += renderMonth(y, m);
    m++;
    if(m > 11){ m = 0; y++; }
  }
  document.getElementById('cal-months').innerHTML = html;
}

function init(){
  const data = window.SITE_DATA;
  if(!data){ document.body.classList.add('is-ready'); return; }
  const studio = data.studios[STUDIO_KEY];
  if(!studio){ document.body.classList.add('is-ready'); return; }

  if(studio.accentColor) document.documentElement.style.setProperty('--accent', studio.accentColor);

  const brandEl = document.getElementById('nav-brand');
  const name = studio.shortName || studio.name || '';
  brandEl.innerHTML = `${esc(name.replace(/\.$/,''))}<span class="b-mark">.</span>`;

  const bookingBtn = document.getElementById('booking-btn');
  const ctaBtn = document.getElementById('cta-btn');
  bookingBtn.href = studio.bookingUrl || '#';
  ctaBtn.href = studio.bookingUrl || '#';

  document.getElementById('footer-copy').textContent = data.global.copyright;
  document.getElementById('page-title').textContent = `Calendar | ${studio.name}`;

  if(studio.calendar){
    if(studio.calendar.note){
      document.getElementById('cal-note-main').textContent = studio.calendar.note;
    }
  }

  renderCalendar();
  document.body.classList.add('is-ready');
}

setTimeout(()=>document.body.classList.add('is-ready'), 1200);
init();
</script>
</body>
</html>
