<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CMS — Trunklii</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;--off:#f4f2ee;--mid:#888078;
  --et:#b8935a;--nr:#7a9e95;
  --panel:#fff;--border:rgba(17,16,16,.1);
  --danger:#c0392b;--success:#4a7c59;
  --sans:'Jost',sans-serif;--display:'Cormorant Garamond',serif;
}
html,body{height:100%}
body{background:var(--off);font-family:var(--sans);font-weight:300;font-size:13px;color:var(--ink);display:flex;flex-direction:column}

.top{background:var(--ink);color:var(--off);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;flex-shrink:0;gap:1rem;flex-wrap:wrap}
.top-title{font-family:var(--sans);font-weight:500;font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;white-space:nowrap}
.top-links{display:flex;gap:.5rem;flex-wrap:wrap}
.top-links a{color:rgba(244,242,238,.45);text-decoration:none;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(244,242,238,.18);padding:.28rem .75rem;transition:all .2s;white-space:nowrap}
.top-links a:hover{color:var(--off);border-color:rgba(244,242,238,.45)}

.layout{display:flex;flex:1;overflow:hidden}

.sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.studio-switch{display:flex;border-bottom:1px solid var(--border)}
.sw-btn{flex:1;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:500;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);padding:.7rem .5rem;transition:all .2s;border-bottom:2px solid transparent}
.sw-btn.on-et{color:var(--et);border-bottom-color:var(--et);font-weight:600}
.sw-btn.on-nr{color:var(--nr);border-bottom-color:var(--nr);font-weight:600}
.sb-group{padding:.6rem 0}
.sb-label{padding:.2rem 1.2rem .1rem;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid)}
.sb-btn{display:block;width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:.55rem 1.2rem;font-family:var(--sans);font-weight:400;font-size:.72rem;color:var(--ink);transition:background .2s;border-left:2px solid transparent;white-space:nowrap}
.sb-btn:hover{background:rgba(17,16,16,.04)}
.sb-btn.active{background:rgba(184,147,90,.08);border-left-color:var(--et);font-weight:500}
.sb-btn.active-nr{border-left-color:var(--nr);background:rgba(122,158,149,.08)}

.main{flex:1;overflow-y:auto;padding:2rem}

.panel{background:var(--panel);border:1px solid var(--border);padding:1.8rem;margin-bottom:1.5rem}
.panel-title{font-family:var(--sans);font-weight:500;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.panel-sub{font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);margin:1.5rem 0 .75rem}

.row{margin-bottom:1.1rem}
.row label{display:block;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:.35rem}
.row input,.row textarea,.row select{width:100%;border:1px solid var(--border);background:var(--off);padding:.5rem .7rem;font-family:var(--sans);font-size:.78rem;color:var(--ink);outline:none;transition:border-color .2s;resize:vertical}
.row input:focus,.row textarea:focus{border-color:var(--et)}
.row textarea{min-height:80px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

.btn{display:inline-block;cursor:pointer;border:none;font-family:var(--sans);font-weight:500;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;padding:.55rem 1.3rem;transition:all .2s}
.btn-primary{background:var(--ink);color:var(--off)}
.btn-primary:hover{background:#333}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--mid)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-add{display:block;width:100%;background:none;border:1px dashed rgba(17,16,16,.18);color:var(--mid);padding:.6rem;text-align:center;cursor:pointer;font-family:var(--sans);font-weight:400;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;transition:all .2s}
.btn-add:hover{border-color:var(--et);color:var(--et)}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.2rem;align-items:center}

.list-item{border:1px solid var(--border);padding:1rem;margin-bottom:.6rem;background:var(--off);display:flex;gap:.75rem;align-items:flex-start}
.li-body{flex:1;display:flex;flex-direction:column;gap:.5rem}
.li-body input,.li-body textarea{width:100%;border:1px solid var(--border);background:#fff;padding:.4rem .6rem;font-family:var(--sans);font-size:.75rem;color:var(--ink);outline:none}
.li-body input:focus,.li-body textarea:focus{border-color:var(--et)}
.li-body textarea{min-height:52px;resize:vertical}
.li-ctrl{display:flex;flex-direction:column;gap:.4rem;flex-shrink:0}
.li-ctrl button{font-size:.6rem;padding:.28rem .55rem;cursor:pointer;border:1px solid var(--border);background:none;color:var(--mid);transition:all .2s;white-space:nowrap}
.li-ctrl .del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.li-ctrl .up:hover,.li-ctrl .dn:hover{background:var(--ink);color:var(--off);border-color:var(--ink)}

.img-upload-area{border:1px dashed rgba(17,16,16,.2);padding:2rem;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--off);position:relative;overflow:hidden}
.img-upload-area:hover{border-color:var(--et)}
.img-upload-label{font-size:.7rem;letter-spacing:.14em;color:var(--mid)}
.img-upload-label span{color:var(--et)}

.hero-slots{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.hero-slot{width:160px;flex-shrink:0}
.hero-slot-thumb{width:100%;height:100px;object-fit:cover;display:block;border:1px solid var(--border)}
.hero-slot-label{font-size:.58rem;letter-spacing:.1em;color:var(--mid);text-align:center;margin-top:.35rem}

.gallery-cms{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.75rem;margin-bottom:1rem}
.gcms-item{position:relative;border:1px solid var(--border);overflow:hidden}
.gcms-item img{width:100%;height:180px;object-fit:cover;display:block}
.gcms-badge{position:absolute;top:.3rem;left:.3rem;background:var(--et);color:var(--off);font-size:.55rem;padding:.12rem .4rem;letter-spacing:.08em;z-index:2}
.gcms-overlay{position:absolute;inset:0;background:rgba(17,16,16,.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;opacity:0;transition:opacity .2s;padding:.5rem;overflow-y:auto}
.gcms-item:hover .gcms-overlay{opacity:1}
.gcms-overlay button,.gcms-overlay select,.gcms-overlay input,.gcms-overlay label{background:none;border:1px solid rgba(244,242,238,.35);color:var(--off);font-size:.6rem;padding:.22rem .5rem;cursor:pointer;letter-spacing:.08em;font-family:var(--sans);transition:background .2s;width:100%;text-align:center;flex-shrink:0;min-height:0}
.gcms-overlay button:hover,.gcms-overlay label:hover{background:rgba(244,242,238,.15)}
.gcms-overlay select{background:rgba(17,16,16,.5);color:var(--off)}
.gcms-overlay input{background:rgba(17,16,16,.5);color:var(--off)}
.gcms-overlay input[type="date"]{color-scheme:dark}

.items-cms{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:1rem}
.icms-item{border:1px solid var(--border);padding:.5rem}
.icms-item img{width:100%;height:110px;object-fit:cover;display:block;margin-bottom:.5rem}
.icms-item input{width:100%;border:1px solid var(--border);background:var(--off);padding:.35rem .5rem;font-size:.72rem;font-family:var(--sans);outline:none;margin-bottom:.35rem}
.icms-item input:focus{border-color:var(--et)}
.icms-item-btns{display:flex;gap:.3rem}
.icms-item-btns button,.icms-item-btns label{flex:1;font-size:.58rem;padding:.25rem .4rem;cursor:pointer;border:1px solid var(--border);background:none;color:var(--mid);transition:all .2s;font-family:var(--sans);text-align:center}
.icms-item-btns .del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.icms-item-btns label:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

.flow-cms-item{display:grid;grid-template-columns:48px 1fr auto;gap:1rem;align-items:flex-start;padding:1rem;border:1px solid var(--border);background:var(--off);margin-bottom:.6rem}
.flow-num-badge{width:40px;height:40px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-style:italic;font-size:.95rem}
.flow-fields{display:flex;flex-direction:column;gap:.4rem}
.flow-fields input,.flow-fields textarea{width:100%;border:1px solid var(--border);background:#fff;padding:.4rem .6rem;font-family:var(--sans);font-size:.75rem;color:var(--ink);outline:none}
.flow-fields input:focus,.flow-fields textarea:focus{border-color:var(--et)}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--ink);color:var(--off);padding:.6rem 1.2rem;font-size:.68rem;letter-spacing:.1em;transform:translateY(50px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--danger)}

.export-pre{background:var(--off);border:1px solid var(--border);padding:1rem;font-family:monospace;font-size:.7rem;overflow:auto;max-height:280px;white-space:pre;color:#555;margin-bottom:1rem}

.global-note{font-size:.7rem;color:var(--mid);line-height:1.7;margin-bottom:1rem;font-style:italic}

@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;overflow:visible}
  .studio-switch{width:100%}
  .sb-group{display:flex;flex-wrap:wrap}
  .sb-label{width:100%}
  .main{padding:1rem}
  .row-2{grid-template-columns:1fr}
  .flow-cms-item{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top">
  <span class="top-title">CMS — Trunklii</span>
  <div class="top-links">
    <a href="./" target="_blank">LP →</a>
    <a href="./et/" target="_blank">et. →</a>
    <a href="./nr/" target="_blank">nr. →</a>
  </div>
</div>

<div class="layout">

<aside class="sidebar">
  <div class="studio-switch">
    <button class="sw-btn on-et" id="sw-et" onclick="setStudio('et')">Studio et.</button>
    <button class="sw-btn" id="sw-nr" onclick="setStudio('nr')">Maison nr.</button>
  </div>
  <div class="sb-group">
    <div class="sb-label">General</div>
    <button class="sb-btn active" onclick="show('global')">Global Settings</button>
  </div>
  <div class="sb-group">
    <div class="sb-label" id="sb-studio-label">Studio et.</div>
    <button class="sb-btn" onclick="show('basic')">Basic Info</button>
    <button class="sb-btn" onclick="show('hero')">Hero Images</button>
    <button class="sb-btn" onclick="show('about')">About</button>
    <button class="sb-btn" onclick="show('gallery')">Gallery</button>
    <button class="sb-btn" onclick="show('kimono')">Kimono</button>
    <button class="sb-btn" onclick="show('costume')">Costume</button>
    <button class="sb-btn" onclick="show('plans')">Plans</button>
    <button class="sb-btn" onclick="show('goods')">Goods</button>
    <button class="sb-btn" onclick="show('calendar')">Calendar</button>
    <button class="sb-btn" onclick="show('reservation')">Reservation</button>
    <button class="sb-btn" onclick="show('cancel')">Cancel Policy</button>
    <button class="sb-btn" onclick="show('qa')">Q&A</button>
    <button class="sb-btn" onclick="show('flow')">Flow</button>
    <button class="sb-btn" onclick="show('recruit')">Recruit</button>
    <button class="sb-btn" onclick="show('cta')">CTA / Booking</button>
  </div>
  <div class="sb-group">
    <div class="sb-label">Export</div>
    <button class="sb-btn" onclick="show('export')">Export site-data.js</button>
  </div>
</aside>

<main class="main" id="main"></main>

</div>

<div class="toast" id="toast"></div>

<script src="site-data.js"></script>
<script>
// site-data.js の読み込み状態を確認
if(!window.SITE_DATA || typeof window.SITE_DATA !== 'object'){
  // フォールバック: 空の最小限データで起動し、ユーザーに状況を伝える
  console.error('[CMS] site-data.js の読み込みに失敗しました、または window.SITE_DATA が定義されていません');
  window.SITE_DATA = {
    global: { brandName: 'Trunklii', copyright: '© 2026 Trunklii. All rights reserved.' },
    studios: {
      et: { key:'et', name:'Studio et.', shortName:'et.', tagline:'', description:'', accentColor:'#b8935a',
            address:'', tel:'', hours:'', instagram:'', instagramHandle:'', mapUrl:'', bookingUrl:'', bookingLabel:'予約する', comingSoon:false,
            heroImages:[], about:{image:'',heading:'',body:''}, gallery:[],
            kimono:{heading:'Kimono',body:'',items:[]}, costume:{heading:'Costume',body:'',items:[]},
            plans:[], goods:{heading:'Goods',body:'',items:[]},
            calendar:{heading:'Calendar',body:'',embedUrl:'',note:''},
            reservation:{heading:'Reservation',body:'',formUrl:'',note:''},
            cancelPolicy:{heading:'Cancellation Policy',body:'',items:[],note:''},
            qa:{heading:'Q & A',body:'',items:[]},
            flow:{heading:'Flow',body:'',steps:[]},
            recruit:{heading:'Recruit',body:'',positions:[],contactEmail:''},
            ctaHeading:'',ctaNote:'' },
      nr: { key:'nr', name:'Maison nr.', shortName:'nr.', tagline:'', description:'', accentColor:'#7a9e95',
            address:'', tel:'', hours:'', instagram:'', instagramHandle:'', mapUrl:'', bookingUrl:'', bookingLabel:'予約する', comingSoon:true,
            heroImages:[], about:{image:'',heading:'',body:''}, gallery:[],
            kimono:{heading:'Kimono',body:'',items:[]}, costume:{heading:'Costume',body:'',items:[]},
            plans:[], goods:{heading:'Goods',body:'',items:[]},
            calendar:{heading:'Calendar',body:'',embedUrl:'',note:''},
            reservation:{heading:'Reservation',body:'',formUrl:'',note:''},
            cancelPolicy:{heading:'Cancellation Policy',body:'',items:[],note:''},
            qa:{heading:'Q & A',body:'',items:[]},
            flow:{heading:'Flow',body:'',steps:[]},
            recruit:{heading:'Recruit',body:'',positions:[],contactEmail:''},
            ctaHeading:'',ctaNote:'' }
    }
  };
  // 起動後にエラー通知を出す
  setTimeout(() => {
    if(typeof toast === 'function'){
      toast('site-data.js を読み込めませんでした。ファイルが存在するか確認してください', true);
    } else {
      alert('site-data.js が読み込めませんでした。\n\n以下をご確認ください:\n1. cms.html と同じ階層に site-data.js があるか\n2. site-data.js の中身にエラーがないか(ブラウザの開発者ツールのConsoleを確認)\n3. ページを強制リロード(Ctrl+Shift+R / Cmd+Shift+R)してみる');
    }
  }, 300);
}
let D = JSON.parse(JSON.stringify(window.SITE_DATA));
let currentStudio = 'et';
let currentPanel = 'global';

function setStudio(key){
  currentStudio = key;
  document.getElementById('sw-et').className = 'sw-btn' + (key==='et'?' on-et':'');
  document.getElementById('sw-nr').className = 'sw-btn' + (key==='nr'?' on-nr':'');
  document.getElementById('sb-studio-label').textContent = D.studios[key].name;
  show(currentPanel==='global'?'global':currentPanel);
}

function show(id){
  currentPanel = id;
  document.querySelectorAll('.sb-btn').forEach(b=>{
    const matches = b.getAttribute('onclick')?.includes(`'${id}'`);
    b.classList.toggle('active', matches && currentStudio==='et');
    b.classList.toggle('active-nr', matches && currentStudio==='nr');
  });
  // 動的パネル: plan-detail-{key}
  if(id.startsWith('plan-detail-')){
    const key = id.replace('plan-detail-','');
    return renderPlanDetail(key);
  }
  const panels = {
    global: renderGlobal,
    basic: renderBasic,
    hero: renderHero,
    about: renderAbout,
    gallery: renderGallery,
    kimono: ()=>renderItems('kimono','Kimono'),
    costume: ()=>renderItems('costume','Costume'),
    plans: renderPlans,
    goods: renderGoods,
    calendar: renderCalendar,
    reservation: renderReservation,
    cancel: renderCancel,
    qa: renderQa,
    flow: renderFlow,
    recruit: renderRecruit,
    cta: renderCta,
    export: renderExport,
  };
  (panels[id]||renderGlobal)();
}

const m = ()=>document.getElementById('main');
const d = ()=>D.studios[currentStudio];
const esc = s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const val = id=>document.getElementById(id)?.value??'';
// 画像パスヘルパー: base64 (data:) はそのまま、相対ファイル名は現在のスタジオフォルダ配下を参照
const imgSrc = file => {
  if(!file) return '';
  const s = String(file);
  if(s.startsWith('data:') || s.startsWith('http://') || s.startsWith('https://') || s.startsWith('/')) return s;
  return `${currentStudio}/${s}`;
};

function toast(msg,err){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(err?' err':'');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

function arrMove(arr,i,dir){ const t=arr[i]; arr[i]=arr[i+dir]; arr[i+dir]=t; }

// ── GLOBAL ──
function renderGlobal(){
  const g = D.global;
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Global Settings</div>
      <p class="global-note">サイト全体に適用される設定です。</p>
      <div class="row"><label>ブランド名</label><input id="g-brand" value="${esc(g.brandName)}"/></div>
      <div class="row"><label>Copyright</label><input id="g-copy" value="${esc(g.copyright)}"/></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveGlobal()">保存</button></div>
    </div>
  `;
}
function saveGlobal(){
  D.global.brandName = val('g-brand');
  D.global.copyright = val('g-copy');
  toast('保存しました ✓');
}

// ── BASIC INFO ──
function renderBasic(){
  const s = d();
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Basic Info — ${esc(s.name)}</div>
      <div class="row-2">
        <div class="row"><label>スタジオ名</label><input id="b-name" value="${esc(s.name)}"/></div>
        <div class="row"><label>略称</label><input id="b-short" value="${esc(s.shortName)}"/></div>
      </div>
      <div class="row"><label>タグライン</label><input id="b-tag" value="${esc(s.tagline)}"/></div>
      <div class="row"><label>説明文</label><textarea id="b-desc">${esc(s.description)}</textarea></div>
      <div class="row"><label>アクセントカラー</label><input id="b-color" type="color" value="${s.accentColor}" style="width:60px;height:36px;padding:2px"/></div>
      <div class="row-2">
        <div class="row"><label>住所</label><input id="b-addr" value="${esc(s.address)}"/></div>
        <div class="row"><label>電話番号</label><input id="b-tel" value="${esc(s.tel)}"/></div>
      </div>
      <div class="row-2">
        <div class="row"><label>営業時間</label><input id="b-hours" value="${esc(s.hours)}"/></div>
        <div class="row"><label>Google Maps URL (Access)</label><input id="b-map" value="${esc(s.mapUrl||'')}"/></div>
      </div>
      <div class="row-2">
        <div class="row"><label>Instagram URL</label><input id="b-ig" value="${esc(s.instagram)}"/></div>
        <div class="row"><label>Instagram ハンドル</label><input id="b-ighandle" value="${esc(s.instagramHandle||'')}"/></div>
      </div>
      <div class="row-2">
        <div class="row"><label>予約 URL</label><input id="b-book" value="${esc(s.bookingUrl)}"/></div>
        <div class="row"><label>予約ボタンラベル</label><input id="b-blabel" value="${esc(s.bookingLabel)}"/></div>
      </div>
      <div class="row">
        <label>Coming Soon モード</label>
        <select id="b-soon">
          <option value="false" ${!s.comingSoon?'selected':''}>非表示（通常公開）</option>
          <option value="true" ${s.comingSoon?'selected':''}>表示（準備中）</option>
        </select>
      </div>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveBasic()">保存</button></div>
    </div>
  `;
}
function saveBasic(){
  const s=d();
  s.name=val('b-name'); s.shortName=val('b-short'); s.tagline=val('b-tag');
  s.description=val('b-desc'); s.accentColor=val('b-color');
  s.address=val('b-addr'); s.tel=val('b-tel'); s.hours=val('b-hours');
  s.mapUrl=val('b-map');
  s.instagram=val('b-ig'); s.instagramHandle=val('b-ighandle');
  s.bookingUrl=val('b-book'); s.bookingLabel=val('b-blabel');
  s.comingSoon = val('b-soon')==='true';
  toast('保存しました ✓');
}

// ── HERO ──
function renderHero(){
  const s=d();
  if(!Array.isArray(s.heroImages)) s.heroImages = [];
  const slots = s.heroImages.map((img,i)=>{
    const src = img.file||'';
    return `
      <div class="hero-slot">
        <img class="hero-slot-thumb" id="hero-thumb-${i}" src="${esc(imgSrc(src))}" onerror="this.style.opacity=0" style="opacity:${src?1:0}"/>
        <div class="img-upload-area" style="margin-top:.4rem;padding:1rem">
          <div class="img-upload-label">Slide ${i+1}<br><span>画像をアップロード</span></div>

        </div>

        <div class="li-ctrl" style="flex-direction:row;justify-content:center;margin-top:.4rem">
          ${i>0?`<button class="up" onclick="arrMove(D.studios['${currentStudio}'].heroImages,${i},-1);renderHero()">↑</button>`:''}
          ${i<s.heroImages.length-1?`<button class="dn" onclick="arrMove(D.studios['${currentStudio}'].heroImages,${i},1);renderHero()">↓</button>`:''}
          <button class="del" onclick="D.studios['${currentStudio}'].heroImages.splice(${i},1);renderHero()">削除</button>
        </div>
        <div class="hero-slot-label">Slide ${i+1}</div>
      </div>
    `;
  }).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Hero Images — ${esc(d().name)}</div>
      <p class="global-note">各スライドの画像をアップロードしてください。複数枚で自動カルーセル表示されます。</p>
      <div class="hero-slots">${slots}</div>
      <button class="btn-add" onclick="D.studios['${currentStudio}'].heroImages.push({file:'',alt:''});renderHero()">＋ スライドを追加する</button>
      <div class="btn-row"><button class="btn btn-primary" onclick="toast('保存しました ✓')">保存</button></div>
    </div>
  `;
}
function heroSetAlt(i, v){ const s=d(); if(!s.heroImages[i]) s.heroImages[i]={file:'',alt:''}; s.heroImages[i].alt=v; }
function heroUpload(input){
  const slot = parseInt(input.dataset.slot);
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e=>{
    const s=d();
    if(!s.heroImages[slot]) s.heroImages[slot]={file:'',alt:''};
    s.heroImages[slot].file = e.target.result;
    const t=document.getElementById('hero-thumb-'+slot); if(t){t.src=e.target.result;t.style.opacity=1;}
    toast(`Slide ${slot+1} 更新 ✓`);
  };
  r.readAsDataURL(file);
}

function galleryReplace(input){
  const i=parseInt(input.dataset.idx); const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{ d().gallery[i].file=e.target.result; renderGallery(); toast('画像を更新 ✓'); };
  r.readAsDataURL(file);
}
function galleryAdd(input){
  const files=Array.from(input.files); let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      const today = new Date().toISOString().slice(0,10);
      d().gallery.push({file:e.target.result,caption:file.name.replace(/\.[^.]+$/,''),category:'other',date:today});
      done++;
      if(done===files.length){ renderGallery(); toast(`${files.length}枚追加 ✓`); }
    };
    r.readAsDataURL(file);
  });
}

// ── ITEMS (kimono / costume) ──
function renderItems(section, label){
  const s=d(); const sec=s[section];
  const items = sec.items.map((item,i)=>`
    <div class="icms-item">
      <img src="${esc(imgSrc(item.file))}" alt="${esc(item.name)}" onerror="this.style.opacity=0.3"/>
      <input placeholder="名前" value="${esc(item.name)}" oninput="D.studios['${currentStudio}']['${section}'].items[${i}].name=this.value"/>
      <input placeholder="説明" value="${esc(item.desc)}" oninput="D.studios['${currentStudio}']['${section}'].items[${i}].desc=this.value"/>
      <div class="icms-item-btns">
        <label>変更<input type="file" accept="image/*" data-idx="${i}" onchange="itemReplace(this,'${section}')" style="display:none"/></label>
        <button class="del" onclick="D.studios['${currentStudio}']['${section}'].items.splice(${i},1);renderItems('${section}','${label}')">削除</button>
      </div>
    </div>
  `).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">${label} — ${esc(s.name)}</div>

        <input type="file" accept="image/*" multiple onchange="itemAdd(this,'${section}','${label}')" style="position:absolute;inset:0;opacity:0;cursor:pointer"/>

function itemReplace(input,sec){
  const i=parseInt(input.dataset.idx); const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{ d()[sec].items[i].file=e.target.result; renderItems(sec, sec.charAt(0).toUpperCase()+sec.slice(1)); toast('画像を更新 ✓'); };
  r.readAsDataURL(file);
}
function itemAdd(input,sec,label){
  const files=Array.from(input.files); let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      d()[sec].items.push({file:e.target.result,name:file.name.replace(/\.[^.]+$/,''),desc:''});
      done++;
      if(done===files.length){ renderItems(sec,label); toast(`${files.length}件追加 ✓`); }
    };
    r.readAsDataURL(file);
  });
}
function saveItems(sec){ d()[sec].heading=val('it-heading'); d()[sec].body=val('it-body'); toast('保存しました ✓'); }

// ── PLANS ──
function renderPlans(){
  const s=d();
  // variantsから最低価格を算出
  function minPriceOf(p){
    if(!p.variants || p.variants.length===0) return '—';
    const nums = p.variants.map(v=>{
      const mt = String(v.price||'').match(/[\d,]+/g);
      return mt ? parseInt(mt.join('').replace(/,/g,'')) : NaN;
    }).filter(n=>!isNaN(n));
    if(nums.length===0) return p.variants[0].price || '—';
    return `¥${Math.min(...nums).toLocaleString()}〜`;
  }
  const rows = s.plans.map((p,i)=>{
    const variantCount = (p.variants||[]).length;
    return `
    <div class="list-item">
      <div class="li-body">
        <input placeholder="プラン名" value="${esc(p.name)}" oninput="D.studios['${currentStudio}'].plans[${i}].name=this.value"/>
        <input placeholder="URLキー (例: 753, newborn) — 半角英数のみ" value="${esc(p.key||'')}" oninput="D.studios['${currentStudio}'].plans[${i}].key=this.value.toLowerCase().replace(/[^a-z0-9_-]/g,'')"/>
        <textarea placeholder="一覧用の短い説明文" oninput="D.studios['${currentStudio}'].plans[${i}].desc=this.value">${esc(p.desc)}</textarea>
        <input placeholder="タグ (例: 人気No.1) — 不要なら空白" value="${esc(p.tag||'')}" oninput="D.studios['${currentStudio}'].plans[${i}].tag=this.value"/>
        <div style="display:flex;gap:.6rem;align-items:center;margin-top:.4rem;font-family:var(--sans);font-size:.7rem;color:var(--mid)">
          <span>最低価格: <strong style="color:var(--ink)">${esc(minPriceOf(p))}</strong></span>
          <span>·</span>
          <span>バリエーション: <strong style="color:var(--ink)">${variantCount}件</strong></span>
        </div>
        <button class="btn btn-primary" style="margin-top:.6rem;padding:.5rem 1rem;font-size:.7rem" onclick="show('plan-detail-${esc(p.key||'')}')">→ このプランの詳細を編集</button>
      </div>
      <div class="li-ctrl">
        <button class="del" onclick="if(confirm('「${esc(p.name)}」を削除しますか?')){D.studios['${currentStudio}'].plans.splice(${i},1);renderPlans()}">削除</button>
        ${i>0?`<button class="up" onclick="arrMove(D.studios['${currentStudio}'].plans,${i},-1);renderPlans()">↑</button>`:''}
        ${i<s.plans.length-1?`<button class="dn" onclick="arrMove(D.studios['${currentStudio}'].plans,${i},1);renderPlans()">↓</button>`:''}
      </div>
    </div>`;
  }).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Plans — ${esc(s.name)}</div>
      <p style="font-family:var(--sans);font-size:.78rem;color:var(--mid);margin-bottom:1.2rem;line-height:1.7">
        プランの基本情報を編集します。価格・撮影時間・カット数などはプランごとに「詳細を編集」から設定してください。
      </p>
      <div>${rows}</div>
      <button class="btn-add" onclick="addNewPlan()">＋ プランを追加</button>
      <div class="btn-row"><button class="btn btn-primary" onclick="toast('保存しました ✓')">保存</button></div>
    </div>
  `;
}

function addNewPlan(){
  // ユニークな key を生成
  const existing = (d().plans||[]).map(p=>p.key||'');
  let n = 1, key = `new${n}`;
  while(existing.includes(key)){ n++; key = `new${n}`; }
  d().plans.push({
    key, name: 'New Plan', desc: '', tag: '',
    detail: { heroImage: '', tagline: '', longDescription: '', notes: '' },
    variants: []
  });
  renderPlans();
}

  return (d().plans||[]).findIndex(p=>p.key===key);
}

function planDetailHeroUpload(input){
  const key = input.dataset.key;
  const i = findPlanIndex(key);
  const file = input.files[0]; if(!file || i<0) return;
  const r = new FileReader();
  r.onload = e => {
    if(!d().plans[i].detail) d().plans[i].detail = { heroImage:'', tagline:'', longDescription:'', notes:'' };
    d().plans[i].detail.heroImage = e.target.result;
    renderPlanDetail(key);
    toast('ヒーロー画像を更新 ✓');
  };
  r.readAsDataURL(file);
}

function variantGalleryAdd(input){
  const pi = parseInt(input.dataset.pi);
  const vi = parseInt(input.dataset.vi);
  const key = input.dataset.key;
  const files = Array.from(input.files);
  if(files.length===0) return;
  let done = 0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const variant = d().plans[pi].variants[vi];
      if(!variant.gallery) variant.gallery = [];
      variant.gallery.push(e.target.result);
      done++;
      if(done===files.length){
        renderPlanDetail(key);
        toast(`${files.length}枚追加 ✓`);
      }
    };
    r.readAsDataURL(file);
  });
}

function addVariant(key){
  const i = findPlanIndex(key);
  if(i<0) return;
  if(!d().plans[i].variants) d().plans[i].variants = [];
  d().plans[i].variants.push({
    cuts: null, label: 'New Variant', price: '¥0', duration: '',
    description: '', includes: [], options: [], gallery: []
  });
  renderPlanDetail(key);
}

function goodsReplace(input){
  const i=parseInt(input.dataset.idx); const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{ d().goods.items[i].file=e.target.result; renderGoods(); toast('画像を更新 ✓'); };
  r.readAsDataURL(file);
}
function goodsAdd(input){
  const files=Array.from(input.files); let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      d().goods.items.push({file:e.target.result,name:file.name.replace(/\.[^.]+$/,''),price:'',desc:''});
      done++;
      if(done===files.length){ renderGoods(); toast(`${files.length}件追加 ✓`); }
    };
    r.readAsDataURL(file);
  });
}

        <input placeholder="質問" value="${esc(it.q)}" oninput="D.studios['${currentStudio}'].qa.items[${i}].q=this.value"/>
        <textarea placeholder="回答" oninput="D.studios['${currentStudio}'].qa.items[${i}].a=this.value">${esc(it.a)}</textarea>
      </div>
      <div class="li-ctrl">
        <button class="del" onclick="D.studios['${currentStudio}'].qa.items.splice(${i},1);renderQa()">削除</button>
        ${i>0?`<button class="up" onclick="arrMove(D.studios['${currentStudio}'].qa.items,${i},-1);renderQa()">↑</button>`:''}
        ${i<q.items.length-1?`<button class="dn" onclick="arrMove(D.studios['${currentStudio}'].qa.items,${i},1);renderQa()">↓</button>`:''}
      </div>
    </div>
  `).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Q & A — ${esc(s.name)}</div>
      <div class="row"><label>見出し</label><input id="qa-heading" value="${esc(q.heading)}"/></div>
      <div class="row"><label>本文</label><textarea id="qa-body">${esc(q.body)}</textarea></div>
      <div class="panel-sub">Q&A 項目</div>
      <p class="global-note">※ Q&Aボットには上から5件が候補として表示されます。</p>
      <div>${rows}</div>
      <button class="btn-add" onclick="D.studios['${currentStudio}'].qa.items.push({q:'',a:''});renderQa()">＋ Q&Aを追加</button>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveQa()">保存</button></div>
    </div>
  `;
}
function saveQa(){
  const q=d().qa;
  q.heading=val('qa-heading'); q.body=val('qa-body');
  toast('保存しました ✓');
}

// ── FLOW ──
function renderFlow(){
  const f=d().flow||(d().flow={heading:'Flow',body:'',steps:[]});
  const rows = f.steps.map((s,i)=>`
    <div class="flow-cms-item">
      <div class="flow-num-badge">${String(i+1).padStart(2,'0')}</div>
      <div class="flow-fields">
        <input placeholder="ステップ名" value="${esc(s.title)}" oninput="D.studios['${currentStudio}'].flow.steps[${i}].title=this.value"/>
        <textarea placeholder="説明" oninput="D.studios['${currentStudio}'].flow.steps[${i}].desc=this.value">${esc(s.desc)}</textarea>
        <input placeholder="補足 — 不要なら空白" value="${esc(s.note)}" oninput="D.studios['${currentStudio}'].flow.steps[${i}].note=this.value"/>
      </div>
      <div class="li-ctrl">
        <button class="del" onclick="D.studios['${currentStudio}'].flow.steps.splice(${i},1);renderFlow()">削除</button>
        ${i>0?`<button class="up" onclick="arrMove(D.studios['${currentStudio}'].flow.steps,${i},-1);renderFlow()">↑</button>`:''}
        ${i<f.steps.length-1?`<button class="dn" onclick="arrMove(D.studios['${currentStudio}'].flow.steps,${i},1);renderFlow()">↓</button>`:''}
      </div>
    </div>
  `).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Flow — ${esc(d().name)}</div>
      <div class="row"><label>見出し</label><input id="fl-heading" value="${esc(f.heading)}"/></div>
      <div class="row"><label>本文</label><textarea id="fl-body">${esc(f.body)}</textarea></div>
      <div class="panel-sub">ステップ</div>
      <div>${rows}</div>
      <button class="btn-add" onclick="D.studios['${currentStudio}'].flow.steps.push({title:'',desc:'',note:''});renderFlow()">＋ ステップを追加</button>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveFlow()">保存</button></div>
    </div>
  `;
}
function saveFlow(){ d().flow.heading=val('fl-heading'); d().flow.body=val('fl-body'); toast('保存しました ✓'); }

// ── RECRUIT ──
function renderRecruit(){
  const s=d(); const r=s.recruit;
  const rows = r.positions.map((p,i)=>`
    <div class="list-item">
      <div class="li-body">
        <input placeholder="役職名" value="${esc(p.title)}" oninput="D.studios['${currentStudio}'].recruit.positions[${i}].title=this.value"/>
        <input placeholder="雇用形態" value="${esc(p.type)}" oninput="D.studios['${currentStudio}'].recruit.positions[${i}].type=this.value"/>
        <textarea placeholder="説明" oninput="D.studios['${currentStudio}'].recruit.positions[${i}].desc=this.value">${esc(p.desc)}</textarea>
      </div>
      <div class="li-ctrl">
        <button class="del" onclick="D.studios['${currentStudio}'].recruit.positions.splice(${i},1);renderRecruit()">削除</button>
      </div>
    </div>
  `).join('');
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Recruit — ${esc(s.name)}</div>
      <div class="row"><label>見出し</label><input id="rc-heading" value="${esc(r.heading)}"/></div>
      <div class="row"><label>本文</label><textarea id="rc-body">${esc(r.body)}</textarea></div>
      <div class="row"><label>問い合わせ Email</label><input id="rc-email" value="${esc(r.contactEmail)}"/></div>
      <div class="panel-sub">募集ポジション</div>
      <div>${rows}</div>
      <button class="btn-add" onclick="D.studios['${currentStudio}'].recruit.positions.push({title:'',type:'',desc:''});renderRecruit()">＋ ポジションを追加</button>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveRecruit()">保存</button></div>
    </div>
  `;
}
function saveRecruit(){ const r=d().recruit; r.heading=val('rc-heading'); r.body=val('rc-body'); r.contactEmail=val('rc-email'); toast('保存しました ✓'); }

// ── CTA ──
function renderCta(){
  const s=d();
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">CTA / Booking — ${esc(s.name)}</div>
      <div class="row"><label>見出し (改行は \\n)</label><textarea id="cta-h">${esc(s.ctaHeading)}</textarea></div>
      <div class="row"><label>サブテキスト</label><input id="cta-n" value="${esc(s.ctaNote)}"/></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveCta()">保存</button></div>
    </div>
  `;
}
function saveCta(){ d().ctaHeading=val('cta-h'); d().ctaNote=val('cta-n'); toast('保存しました ✓'); }

// ── EXPORT ──
function renderExport(){
  m().innerHTML = `
    <div class="panel">
      <div class="panel-title">Export — site-data.js</div>

      <div style="background:rgba(74,124,89,.08);border:1px solid rgba(74,124,89,.3);padding:1rem 1.2rem;margin-bottom:1.5rem">
        <div style="font-weight:500;font-size:.78rem;letter-spacing:.04em;margin-bottom:.5rem;color:var(--success)">✨ 一番ラクな方法</div>
        <ol style="margin:0 0 .3rem 1.2rem;padding:0;font-size:.78rem;line-height:1.9">
          <li>下の <strong>「ダウンロード」</strong> ボタンを押す</li>
          <li>ダウンロードした <code style="background:rgba(17,16,16,.08);padding:.1rem .3rem">site-data.js</code> を <code style="background:rgba(17,16,16,.08);padding:.1rem .3rem">Documents / 01.Trunklii / 99.HP / Trunklii</code> に移動<br/><span style="color:var(--mid);font-size:.72rem">※ 同名ファイルがあれば「置き換え」で OK</span></li>
          <li>同フォルダ内の <code style="background:rgba(17,16,16,.08);padding:.1rem .3rem">update-site-data.command</code> を <strong>ダブルクリック</strong></li>
          <li>ターミナルが開き、自動で GitHub に反映されます(1〜2分後)</li>
        </ol>
      </div>

      <p class="global-note" style="margin-bottom:1rem">手動の場合: 下のコードをコピー → site-data.js を上書き → push</p>
      <pre class="export-pre" id="export-pre"></pre>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="downloadExport()">ダウンロード</button>
        <button class="btn btn-ghost" onclick="copyExport()">コピー(手動用)</button>
      </div>
    </div>
  `;
  document.getElementById('export-pre').textContent = genExport();
}
function genExport(){
  return `// Trunklii — Site Data\n// CMSで編集してエクスポートし、このファイルを上書きするだけでサイトに反映されます\nwindow.SITE_DATA = ${JSON.stringify(D, null, 2)};\n`;
}
function copyExport(){ navigator.clipboard.writeText(genExport()).then(()=>toast('コピーしました ✓')); }
function downloadExport(){
  const blob=new Blob([genExport()],{type:'text/javascript'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='site-data.js'; a.click();
  toast('ダウンロード ✓');
}

show('global');
</script>
