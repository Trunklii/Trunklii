name: Deploy site (main + previews)

on:
  push:
    branches:
      - main
      - 'feat/**'
  delete:
    branches:
      - 'feat/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Prune deleted remote feat branches
        run: git fetch --prune origin '+refs/heads/feat/*:refs/remotes/origin/feat/*'

      - name: Build dist (main -> root, feat/** -> /preview/<slug>/)
        run: |
          set -euo pipefail
          mkdir -p dist

          # main content -> dist root
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='dist' \
            ./ dist/

          # feat/** branches -> dist/preview/<slug>/
          mkdir -p dist/preview
          BUILD_TIME=$(TZ='Asia/Tokyo' date +"%Y-%m-%d %H:%M JST")
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/feat/); do
            branch=${ref#origin/}
            slug=$(echo "$branch" | tr '/' '-')
            target="dist/preview/$slug"
            short_sha=$(git rev-parse --short "$ref")
            echo "=== preview: $branch ($short_sha) -> /preview/$slug/ ==="

            mkdir -p "$target"
            git archive "$ref" | tar -x -C "$target"

            # Strip noise from preview tree
            rm -rf "$target/.github" 2>/dev/null || true
            find "$target" -name '.DS_Store' -delete 2>/dev/null || true

            # Inject noindex + cache-busting meta into every preview HTML <head>
            find "$target" -name '*.html' -type f -exec \
              sed -i 's|<head>|<head>\n<meta name="robots" content="noindex,nofollow"/>\n<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>\n<meta http-equiv="Pragma" content="no-cache"/>\n<meta http-equiv="Expires" content="0"/>|' {} +

            # Inject build-info badge before </body> (preview only)
            badge="<div style=\"position:fixed;left:8px;bottom:8px;z-index:99999;background:rgba(0,0,0,0.78);color:#fff;font:11px/1.4 ui-monospace,Menlo,monospace;padding:6px 10px;border-radius:6px;letter-spacing:.02em;pointer-events:none\">PREVIEW \&middot; ${branch} \&middot; ${short_sha} \&middot; ${BUILD_TIME}</div>"
            find "$target" -name '*.html' -type f -exec \
              sed -i "s|</body>|${badge}</body>|" {} +
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
