<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trunklii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100;0,200;0,300;0,400;1,200;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;
  --off:#f4f2ee;
  --mid:#888078;
  --et:#b8935a;
  --nr:#7a9e95;
  --serif:'Noto Serif JP',serif;
  --sans:'Jost',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);font-family:var(--sans);font-weight:300}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  height:56px;
  pointer-events:none;
}
.nav-logo{
  font-family:var(--sans);font-weight:200;font-size:clamp(.9rem,2vw,1.1rem);
  letter-spacing:.35em;text-transform:uppercase;color:var(--off);
  text-decoration:none;pointer-events:all;
  mix-blend-mode:difference;
}

/* SPLIT */
.split{display:flex;height:100vh;width:100vw}

.panel{
  position:relative;flex:1;overflow:hidden;
  cursor:pointer;text-decoration:none;
  transition:flex .8s cubic-bezier(.77,0,.18,1);
}
.panel:hover{flex:1.18}

.panel-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform 1.4s cubic-bezier(.25,.46,.45,.94),
             filter 1s ease;
  filter:brightness(.42) saturate(.75);
}
.panel:hover .panel-bg{
  transform:scale(1.06);
  filter:brightness(.35) saturate(.85);
}

/* divider */
.divider{
  position:absolute;top:0;bottom:0;right:0;
  width:1px;background:rgba(244,242,238,.1);z-index:2;
}

.panel-body{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;
  text-align:center;
}

.panel-name{
  font-family:var(--sans);font-weight:100;
  font-size:clamp(3rem,8vw,7.5rem);
  letter-spacing:.06em;color:var(--off);
  line-height:1;
  transition:letter-spacing .7s cubic-bezier(.25,.46,.45,.94);
}
.panel:hover .panel-name{letter-spacing:.14em}

.panel-sub{
  font-family:var(--serif);font-weight:200;
  font-size:clamp(.65rem,1.3vw,.78rem);
  letter-spacing:.22em;color:rgba(244,242,238,.45);
  margin-top:.9rem;
  opacity:0;transform:translateY(7px);
  transition:opacity .5s .1s,transform .5s .1s;
}
.panel:hover .panel-sub{opacity:1;transform:translateY(0)}

.panel-rule{
  width:28px;height:1px;margin:1.6rem auto 0;
  transition:width .7s cubic-bezier(.25,.46,.45,.94);
}
.panel-et .panel-rule{background:var(--et)}
.panel-nr .panel-rule{background:var(--nr)}
.panel:hover .panel-rule{width:60px}

.panel-enter{
  position:absolute;bottom:clamp(2rem,4vw,3.5rem);
  left:50%;transform:translateX(-50%);
  font-family:var(--sans);font-weight:200;
  font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(244,242,238,.3);
  border-bottom:1px solid rgba(244,242,238,.15);
  padding-bottom:.25rem;white-space:nowrap;
  transition:color .3s,border-color .3s;
}
.panel:hover .panel-enter{color:rgba(244,242,238,.7);border-color:rgba(244,242,238,.4)}

.coming-tag{
  position:absolute;top:clamp(3.5rem,7vw,5.5rem);right:clamp(1rem,3vw,2.5rem);
  font-family:var(--serif);font-weight:200;font-style:italic;
  font-size:.62rem;letter-spacing:.14em;
  color:var(--nr);border:1px solid rgba(122,158,149,.35);
  padding:.28rem .8rem;z-index:4;
}

/* BOTTOM */
.bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem clamp(1.5rem,4vw,3rem);
  background:rgba(17,16,16,.7);backdrop-filter:blur(8px);
  border-top:1px solid rgba(244,242,238,.07);
  flex-wrap:wrap;gap:.5rem;
}
.bottom-copy{font-size:.58rem;letter-spacing:.1em;color:rgba(244,242,238,.3)}
.bottom-links{display:flex;gap:1.5rem;list-style:none}
.bottom-links a{
  font-family:var(--sans);font-weight:200;font-size:.62rem;
  letter-spacing:.15em;text-transform:uppercase;
  color:rgba(244,242,238,.35);text-decoration:none;
  transition:color .2s;
}
.bottom-links a:hover{color:var(--off)}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.panel-name{animation:fadeUp .9s ease both}
.panel-et .panel-name{animation-delay:.15s}
.panel-nr .panel-name{animation-delay:.3s}

/* MOBILE */
@media(max-width:600px){
  html,body{overflow:auto}
  .split{flex-direction:column;height:auto}
  .panel{height:50vh;min-height:260px;flex:none!important}
  .divider{display:none}
  nav{background:rgba(17,16,16,.6);backdrop-filter:blur(8px)}
}
</style>
</head>
<body>
<nav><a class="nav-logo" href="/">Trunklii</a></nav>

<div class="split">
  <a class="panel panel-et" href="./et/" id="panel-et">
    <div class="panel-bg" id="bg-et"></div>
    <div class="divider"></div>
    <div class="panel-body">
      <div class="panel-name">et.</div>
      <div class="panel-sub">Studio et.</div>
      <div class="panel-rule"></div>
    </div>
    <div class="panel-enter">Enter →</div>
  </a>
  <a class="panel panel-nr" href="./nr/" id="panel-nr">
    <div class="panel-bg" id="bg-nr"></div>
    <div class="panel-body">
      <div class="panel-name">nr.</div>
      <div class="panel-sub">Maison nr.</div>
      <div class="panel-rule"></div>
    </div>
    <div class="panel-enter">Enter →</div>
    <div class="coming-tag">Coming Soon</div>
  </a>
</div>

<div class="bottom">
  <span class="bottom-copy" id="bottom-copy">© 2025 Trunklii</span>
  <ul class="bottom-links">
    <li><a href="./et/">Studio et.</a></li>
    <li><a href="./nr/">Maison nr.</a></li>
    <li><a href="./et/#access">Access</a></li>
    <li><a href="./et/#booking">Booking</a></li>
  </ul>
</div>

<script src="site-data.js"></script>
<script>
(function(){
  const d = window.SITE_DATA;
  const et = d.studios.et, nr = d.studios.nr;
  document.getElementById('bg-et').style.backgroundImage = `url('./et/${et.heroImages[0].file}')`;
  document.getElementById('bg-nr').style.backgroundImage = `url('./nr/${nr.heroImages[0].file}')`;
  document.getElementById('bottom-copy').textContent = d.global.copyright;
  if(!nr.comingSoon) document.querySelector('.coming-tag')?.remove();
})();
</script>
</body>
</html>
