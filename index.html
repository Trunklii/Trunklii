<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#2b2825;
  --off:#f4f2ee;
  --mid:#888078;
  --et:#b8935a;
  --nr:#7a9e95;
  --serif:'Yu Mincho','YuMincho','Hiragino Mincho ProN','Noto Serif JP',serif;
  --sans:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic Medium','YuGothic',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);font-family:var(--sans);font-weight:300}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  height:56px;
  pointer-events:none;
}
.nav-logo{
  font-family:var(--sans);font-weight:200;font-size:clamp(.9rem,2vw,1.1rem);
  letter-spacing:.35em;text-transform:uppercase;color:var(--off);
  text-decoration:none;pointer-events:all;
  mix-blend-mode:difference;
}

/* SPLIT */
.split{display:flex;height:100vh;height:100svh;width:100vw}

.panel{
  position:relative;flex:1;overflow:hidden;
  cursor:pointer;text-decoration:none;
  transition:flex .8s cubic-bezier(.77,0,.18,1);
}
.panel:hover{flex:1.18}

.panel-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform 1.4s cubic-bezier(.25,.46,.45,.94),
             filter 1s ease;
  filter:brightness(.42) saturate(.75);
}
.panel:hover .panel-bg{
  transform:scale(1.06);
  filter:brightness(.35) saturate(.85);
}
/* パネル背景のスライドショー(クロスフェード) */
.pbg-fade{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.8s ease}
.pbg-fade.show{opacity:1}
/* フッターメニューは非表示(2026-07-17 ユーザー指示。コピーライトは表示のまま) */
.bottom .bottom-links{display:none}

/* divider */
.divider{
  position:absolute;top:0;bottom:0;right:0;
  width:1px;background:rgba(244,242,238,.1);z-index:2;
}

.panel-body{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem;
  text-align:center;
}

.panel-name{
  font-family:var(--sans);font-weight:100;
  font-size:clamp(3rem,8vw,7.5rem);
  letter-spacing:.06em;color:var(--off);
  line-height:1;
  transition:letter-spacing .7s cubic-bezier(.25,.46,.45,.94);
}
.panel:hover .panel-name{letter-spacing:.14em}
.panel-logo{display:block;height:clamp(64px,9vw,110px);width:auto;margin:0 auto;transition:transform .7s cubic-bezier(.25,.46,.45,.94)}
.panel-nr .panel-logo{height:clamp(58px,8.2vw,100px)}
.panel:hover .panel-logo{transform:scale(1.05)}

.panel-sub{
  font-family:var(--serif);font-weight:200;
  font-size:clamp(.65rem,1.3vw,.78rem);
  letter-spacing:.22em;color:rgba(244,242,238,.65);
  margin-top:.9rem;
  animation:fadeUp .9s ease both; /* ホバー表示だとスマホで見えないため常時表示+ロード時モーション */
}
.panel-et .panel-sub{animation-delay:.4s}
.panel-nr .panel-sub{animation-delay:.55s}

.panel-rule{
  width:28px;height:1px;margin:1.6rem auto 0;
  transition:width .7s cubic-bezier(.25,.46,.45,.94);
}
.panel-et .panel-rule{background:var(--et)}
.panel-nr .panel-rule{background:var(--nr)}
.panel:hover .panel-rule{width:60px}

.panel-enter{
  position:absolute;bottom:clamp(2rem,4vw,3.5rem);
  left:50%;transform:translateX(-50%);
  font-family:var(--sans);font-weight:200;
  font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(244,242,238,.3);
  border-bottom:1px solid rgba(244,242,238,.15);
  padding-bottom:.25rem;white-space:nowrap;
  transition:color .3s,border-color .3s;
}
.panel:hover .panel-enter{color:rgba(244,242,238,.7);border-color:rgba(244,242,238,.4)}

.coming-tag{
  position:absolute;top:clamp(3.5rem,7vw,5.5rem);right:clamp(1rem,3vw,2.5rem);
  font-family:var(--serif);font-weight:200;font-style:normal;
  font-size:.62rem;letter-spacing:.14em;
  color:var(--nr);border:1px solid rgba(122,158,149,.35);
  padding:.28rem .8rem;z-index:4;
}

/* BOTTOM */
.bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem clamp(1.5rem,4vw,3rem);
  background:rgba(17,16,16,.7);backdrop-filter:blur(8px);
  border-top:1px solid rgba(244,242,238,.07);
  flex-wrap:wrap;gap:.5rem;
}
.bottom-copy{font-size:.58rem;letter-spacing:.1em;color:rgba(244,242,238,.3)}
.bottom-links{display:flex;gap:1.5rem;list-style:none}
.bottom-links a{
  font-family:var(--sans);font-weight:200;font-size:.62rem;
  letter-spacing:.15em;text-transform:uppercase;
  color:rgba(244,242,238,.35);text-decoration:none;
  transition:color .2s;
}
.bottom-links a:hover{color:var(--off)}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.panel-name{animation:fadeUp .9s ease both}
.panel-et .panel-name{animation-delay:.15s}
.panel-nr .panel-name{animation-delay:.3s}

/* MOBILE */
@media(max-width:600px){
  html,body{overflow:auto}
  .split{flex-direction:column;height:auto}
  .panel{height:50vh;min-height:260px;flex:none!important}
  .divider{display:none}
  nav{background:rgba(17,16,16,.6);backdrop-filter:blur(8px)}
  /* 固定フッターが下パネルの ENTER と重なるため、モバイルは通常配置に */
  .bottom{position:static;justify-content:center;padding-bottom:calc(.9rem + env(safe-area-inset-bottom,0px))}
}

<script>
(function(){
  const d = window.SITE_DATA;
  const et = d.studios.et, nr = d.studios.nr;
  // 各ブランドのヒーロー写真(縦リスト優先)をクロスフェードで切替。次の1枚だけ先読みして帯域を節約
  function panelShow(el, images, offset){
    if(!el || !images.length) return;
    el.style.backgroundImage = `url('${images[0]}')`;
    if(images.length < 2) return;
    const fade = document.createElement('div');
    fade.className = 'pbg-fade';
    el.appendChild(fade);
    let idx = 0, busy = false;
    const tick = () => {
      if(busy) return; busy = true;
      const next = (idx + 1) % images.length;
      const im = new Image();
      im.onload = () => {
        fade.style.backgroundImage = `url('${images[next]}')`;
        requestAnimationFrame(() => fade.classList.add('show'));
        setTimeout(() => {
          el.style.backgroundImage = `url('${images[next]}')`;
          fade.classList.remove('show');
          idx = next; busy = false;
        }, 1900);
      };
      im.onerror = () => { busy = false; };
      im.src = images[next];
    };
    setTimeout(() => { tick(); setInterval(tick, 6500); }, offset);
  }
  // パネルの形に合わせて使用リストを選択:
  // スマホ(上下分割=横長パネル)→ PC用の横位置写真 / PC(左右分割=縦長パネル)→ スマホ用の縦位置写真
  const isMobileLayout = window.matchMedia('(max-width:600px)').matches;
  const pickImages = s => {
    const sp = (Array.isArray(s.heroImagesSp) && s.heroImagesSp.length) ? s.heroImagesSp : (s.heroImages || []);
    const pc = (Array.isArray(s.heroImages) && s.heroImages.length) ? s.heroImages : sp;
    return isMobileLayout ? pc : sp;
  };
  panelShow(document.getElementById('bg-et'), pickImages(et).map(x => `./et/${x.file}`), 2500);
  panelShow(document.getElementById('bg-nr'), pickImages(nr).map(x => `./nr/${x.file}`), 5800);
  document.getElementById('bottom-copy').textContent = d.global.copyright;
  if(!nr.comingSoon) document.querySelector('.coming-tag')?.remove();
})();
</script>
