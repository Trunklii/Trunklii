<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;--off:#fff;--bg:#f8f6f2;--mid:#888078;
  --accent:#b8935a;--border:rgba(17,16,16,.1);
  --serif:'Yu Gothic Medium','YuGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;--display:'Cormorant','Yu Mincho','YuMincho','Hiragino Mincho ProN','Noto Serif JP',serif;--sans:'Yu Gothic Medium','YuGothic','Yu Gothic','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;

/* ─── Shared design tokens (index.html と統一) ─── */

.sec-title{font-family:var(--display);font-weight:300;font-style:italic;font-size:clamp(1.6rem,4vw,2.8rem);letter-spacing:-.01em}
.sec-rule{flex:1;height:1px;background:var(--border);min-width:20px}
.section-body-text{font-family:var(--serif);font-weight:300;font-size:.9rem;color:var(--mid);line-height:2.1;white-space:pre-line;margin-bottom:2.5rem}

/* ─── Nav (sub-page) ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(17,16,16,.12)}

/* ─── Tier legend ─── */
.tier-legend{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;margin-bottom:clamp(2rem,4vw,3rem)}

/* ─── Calendar grid ─── */
.cal-months{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,4vw,3rem) clamp(2rem,5vw,4rem);margin-bottom:3rem}

.cal-month-year{font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.14em;color:var(--mid);text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-family:var(--sans);font-weight:500;font-size:.6rem;letter-spacing:.1em;text-align:center;padding:.4rem 0;color:var(--mid);text-transform:uppercase}
.cal-dow.sun{color:#c0382e}
.cal-dow.sat{color:#2e6fc0}
.cal-day{position:relative;text-align:center;padding:.55rem .2rem .3rem;font-family:var(--sans);font-weight:300;font-size:.8rem;min-height:2.8rem;background:#fff}
.cal-day.empty{background:transparent}
.cal-day.sun-col{color:#c0382e}
.cal-day.sat-col{color:#2e6fc0}
.cal-day.holiday{color:#c0382e}
.cal-day::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px}
.cal-day.tier-a::after{background:var(--tier-a)}
.cal-day.tier-b::after{background:var(--tier-b)}
.cal-day.tier-c::after{background:var(--tier-c)}
.cal-day.today{outline:2px solid var(--accent);outline-offset:-2px}

/* ─── Notes ─── */
.cal-notes{padding-top:1.5rem;border-top:1px solid var(--border);text-align:center}
.cal-note{font-family:var(--serif);font-weight:300;font-size:.82rem;line-height:2.1;color:var(--mid);margin-bottom:.4rem}

/* ─── Footer ─── */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:2rem clamp(1.4rem,5vw,3rem);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.2rem;font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.08em}
.footer-logo{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.1rem;color:#fff;letter-spacing:.04em;text-decoration:none}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;gap:1rem}
.footer-links a{color:rgba(255,255,255,.55);text-decoration:none;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-copy{font-size:.66rem;letter-spacing:.1em}

  .tier-legend{gap:1.2rem}

  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
}

</style>

<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const JP_HOLIDAYS = new Set([
  '2025-01-01','2025-01-13',
  '2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20',
  '2025-04-29',
  '2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21',
  '2025-08-11',
  '2025-09-15','2025-09-23',
  '2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12',
  '2026-02-11','2026-02-23',
  '2026-03-20',
  '2026-04-29',
  '2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20',
  '2026-08-11',
  '2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12',
  '2026-11-03','2026-11-23',
]);

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function getTier(y, m, d){
  const dow = new Date(y, m, d).getDay();
  const key = dateKey(y, m, d);
  if(dow === 0 || JP_HOLIDAYS.has(key)) return 'c';
  if(dow === 6) return 'b';
  return 'a';
}

function renderMonth(year, month){
  const MONTHS_JA = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const firstDow = new Date(year, month, 1).getDay();
  const startCol = firstDow === 0 ? 6 : firstDow - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let cells = '';
  for(let i = 0; i < startCol; i++) cells += `<div class="cal-day empty"></div>`;
  for(let d = 1; d <= daysInMonth; d++){
    const dow = new Date(year, month, d).getDay();
    const key = dateKey(year, month, d);
    const tier = getTier(year, month, d);
    let cls = `cal-day tier-${tier}`;
    if(dow === 0) cls += ' sun-col';
    if(dow === 6) cls += ' sat-col';
    if(JP_HOLIDAYS.has(key) && dow !== 0) cls += ' holiday';
    if(key === todayKey) cls += ' today';
    cells += `<div class="${esc(cls)}">${d}</div>`;
  }

  return `
    <div class="cal-month">
      <div class="cal-month-hd">
        <span class="cal-month-name">${esc(MONTHS_JA[month])}</span>
        <span class="cal-month-year">${year}</span>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow sat">土</div><div class="cal-dow sun">日</div>
        ${cells}
      </div>
    </div>`;
}

function renderCalendar(){
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  let html = '';
  for(let i = 0; i < 6; i++){
    html += renderMonth(y, m);
    m++;
    if(m > 11){ m = 0; y++; }
  }
  document.getElementById('cal-months').innerHTML = html;
}

function init(){
  const data = window.SITE_DATA;
  if(!data){ document.body.classList.add('is-ready'); return; }
  const studio = data.studios[STUDIO_KEY];
  if(!studio){ document.body.classList.add('is-ready'); return; }

  if(studio.accentColor) document.documentElement.style.setProperty('--accent', studio.accentColor);

  const name = studio.shortName || studio.name || '';
  document.getElementById('nav-brand').innerHTML = '<img src="../assets/nr-logo.png" alt="Maison nr." style="height:34px;width:auto;display:block;margin:0 auto;filter:brightness(0)"/>';

  document.getElementById('cta-btn').href = studio.bookingUrl || '#';
  document.getElementById('footer-copy').textContent = data.global.copyright;
  document.getElementById('page-title').textContent = `Calendar | ${studio.name}`;

  if(studio.calendar && studio.calendar.note){
    document.getElementById('cal-note-main').textContent = studio.calendar.note;
  }

  // CMSで設定された料金区分があれば動的に描画
  if(studio.calendar && Array.isArray(studio.calendar.tiers) && studio.calendar.tiers.length){
    const legend = document.getElementById('tier-legend');
    if(legend){
      legend.innerHTML = studio.calendar.tiers.map(t=>`
        <div class="tier-item">
          <span class="tier-dot" style="background:${esc(t.color||'#ccc')}"></span>
          <span class="tier-label">${esc(t.label||'')}</span>
          <span class="tier-price">${esc(t.price||'')}</span>
          <span class="tier-days">${esc(t.days||'')}</span>
        </div>
      `).join('');
    }
  }

  renderCalendar();
  document.body.classList.add('is-ready');
}

setTimeout(()=>document.body.classList.add('is-ready'), 1200);
init();
</script>
