<script>
/* ============================================================
   料金シミュレーター エンジン（スキーマ駆動 / 2層モデル）
   マスタ: studio.simulator = { enabled, intro, questions[], rules[] }
   - questions: { id, label, type:'single'|'multi'|'number',
                  options:[{id,label}], showIf:[{q,op,val}],
                  unit, min, max }
   - rules: { id, label, effect:'base'|'add'|'discount'|'perUnit'|'percent',
              amount, per(number質問id), from(bool), when:[{q,op,val}] }
   条件 op: eq / ne / includes / gte / lte / answered
   ============================================================ */
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ return '¥' + Number(n||0).toLocaleString('ja-JP'); }

const el = { log:document.getElementById('sim-log'), foot:document.getElementById('sim-foot') };
let STUDIO=null, SIM=null;
const answers = {};   // questionId -> optionId | [optionIds] | number

function mark(){ return (STUDIO && (STUDIO.shortName||'').replace(/[^A-Za-z]/g,'').slice(0,2)) || 'et'; }
function scrollLog(){ el.log.scrollTop = el.log.scrollHeight; }

function botMsg(html, delay){
  return new Promise(res=>{
    const t=document.createElement('div');
    t.className='msg bot';
    t.innerHTML='<div class="a"></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    t.querySelector('.a').textContent=mark();
    el.log.appendChild(t); scrollLog();
    setTimeout(()=>{ t.querySelector('.bubble').innerHTML=html; scrollLog(); res(); }, delay==null?600:delay);
  });
}
function userMsg(text){
  const d=document.createElement('div');
  d.className='msg user';
  d.innerHTML='<div class="bubble">'+esc(text)+'</div>';
  el.log.appendChild(d); scrollLog();
}

/* ---------- 条件評価 ---------- */
function condPass(c){
  const a=answers[c.q];
  switch(c.op){
    case 'eq': return a===c.val;
    case 'ne': return a!==c.val;
    case 'includes': return Array.isArray(a) && a.includes(c.val);
    case 'gte': return Number(a) >= Number(c.val);
    case 'lte': return Number(a) <= Number(c.val);
    case 'answered': return a!=null && a!=='' && !(Array.isArray(a)&&!a.length);
    default: return true;
  }
}
function allPass(conds){ return !conds || conds.length===0 || conds.every(condPass); }
function qActive(q){ return allPass(q.showIf); }
function answered(q){
  const a=answers[q.id];
  if(q.type==='number') return a!=null;
  if(q.type==='multi')  return a!=null;   // 空配列も「回答済み(なし)」とみなす
  return a!=null && a!=='';
}

/* ---------- ラベル取得 ---------- */
function optLabel(q,id){ const o=(q.options||[]).find(o=>o.id===id); return o?o.label:id; }
function answerLabel(q){
  const a=answers[q.id];
  if(q.type==='number') return (a||0)+(q.unit||'');
  if(q.type==='multi')  return (a&&a.length)? a.map(id=>optLabel(q,id)).join('、') : '選択なし';
  return optLabel(q,a);
}

/* ---------- 料金計算 ---------- */
function ruleApplies(r){ return allPass(r.when); }
function ruleAmount(r){
  if(r.effect==='perUnit'){ const qty=Number(answers[r.per]||0); return { value:r.amount*qty, qty }; }
  if(r.effect==='discount') return { value:-Math.abs(r.amount) };
  return { value:r.amount }; // base / add
}
function compute(){
  let fixed=0, from=false; const lines=[]; const percents=[];
  (SIM.rules||[]).forEach(r=>{
    if(!ruleApplies(r)) return;
    if(r.effect==='percent'){ percents.push(r); return; }
    const a=ruleAmount(r);
    if(r.effect==='perUnit' && (!a.qty || a.qty<=0)) return; // 0なら非表示
    fixed += a.value;
    if(r.from) from=true;
    lines.push({ label: r.label + (r.effect==='perUnit'? ` （${a.qty}${unitOf(r.per)} × ${yen(r.amount)}）`:''),
                 value:a.value, effect:r.effect, from:!!r.from });
  });
  let total=fixed;
  percents.forEach(r=>{
    const delta=Math.round(fixed * (r.amount/100));
    total+=delta;
    lines.push({ label:r.label+`（${r.amount>0?'+':''}${r.amount}%）`, value:delta, effect:'percent' });
  });
  return { total, from, lines };
}
function unitOf(qid){ const q=(SIM.questions||[]).find(q=>q.id===qid); return q&&q.unit?q.unit:'点'; }

/* ---------- フロー制御 ---------- */
function nextQuestion(){
  return (SIM.questions||[]).find(q=>qActive(q) && !answered(q));
}
async function advance(){
  const q=nextQuestion();
  if(!q){ await botMsg('ありがとうございます。概算のお見積りは次のとおりです。'); return showResult(); }
  await askQuestion(q);
}

async function askQuestion(q){
  await botMsg(esc(q.label));
  el.foot.innerHTML='';
  if(q.type==='number') return renderNumber(q);
  if(q.type==='multi')  return renderMulti(q);
  return renderSingle(q);
}

function renderSingle(q){
  const c=document.createElement('div'); c.className='choices';
  (q.options||[]).forEach(o=>{
    const b=document.createElement('button'); b.type='button'; b.className='chip'+(o.image?' chip-img':'');
    b.innerHTML=(o.image?'<img class="chip-thumb" src="'+esc(o.image)+'" alt="" onerror="this.remove()"/>':'')+'<span class="chip-lb">'+esc(o.label||'')+'</span>';
    b.onclick=()=>{ answers[q.id]=o.id; userMsg(o.label||'選択'); el.foot.innerHTML=''; advance(); };
    c.appendChild(b);
  });
  el.foot.innerHTML=''; el.foot.appendChild(c);
}

function renderMulti(q){
  const sel=new Set();
  const wrap=document.createElement('div');
  const list=document.createElement('div'); list.className='opt-list';
  (q.options||[]).forEach(o=>{
    const row=document.createElement('div'); row.className='opt';
    row.innerHTML='<div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></div>'+(o.image?'<img class="opt-thumb" src="'+esc(o.image)+'" alt="" onerror="this.remove()"/>':'')+'<div class="nm">'+esc(o.label||'')+'</div>';
    row.onclick=()=>{ if(sel.has(o.id)){sel.delete(o.id);row.classList.remove('on');} else {sel.add(o.id);row.classList.add('on');} };
    list.appendChild(row);
  });
  wrap.appendChild(list);
  const btn=document.createElement('button'); btn.type='button'; btn.className='btn-primary'; btn.textContent='次へ';
  btn.onclick=()=>{ answers[q.id]=Array.from(sel); userMsg(sel.size? Array.from(sel).map(id=>optLabel(q,id)).join('、'):'選択なし'); el.foot.innerHTML=''; advance(); };
  wrap.appendChild(btn);
  el.foot.innerHTML=''; el.foot.appendChild(wrap);
}

function renderNumber(q){
  const min=q.min!=null?q.min:0, max=q.max!=null?q.max:20;
  let v=Math.max(min, Math.min(max, q.default!=null?q.default:min));
  const wrap=document.createElement('div');
  const ctl=document.createElement('div'); ctl.className='numctl';
  ctl.innerHTML='<button type="button" data-dec aria-label="減らす">−</button><span class="v" data-v>'+v+'</span><span class="u">'+esc(q.unit||'')+'</span><button type="button" data-inc aria-label="増やす">＋</button>';
  const vEl=ctl.querySelector('[data-v]');
  ctl.querySelector('[data-dec]').onclick=()=>{ v=Math.max(min,v-1); vEl.textContent=v; };
  ctl.querySelector('[data-inc]').onclick=()=>{ v=Math.min(max,v+1); vEl.textContent=v; };
  wrap.appendChild(ctl);
  const btn=document.createElement('button'); btn.type='button'; btn.className='btn-primary'; btn.textContent='決定';
  btn.onclick=()=>{ answers[q.id]=v; userMsg(v+(q.unit||'')); el.foot.innerHTML=''; advance(); };
  wrap.appendChild(btn);
  el.foot.innerHTML=''; el.foot.appendChild(wrap);
}

/* ---------- 結果 ---------- */
function showResult(){
  const r=compute();
  const rows=r.lines.map(l=>{
    const sub=l.effect!=='base';
    const minus=l.value<0;
    const val=(minus?'−':(sub?'+':''))+yen(Math.abs(l.value))+(l.from?'〜':'');
    return '<div class="row'+(sub?' sub':'')+'"><span>'+esc(l.label)+'</span><span class="v'+(minus?' minus':'')+'">'+esc(val)+'</span></div>';
  }).join('');
  const receipt=
    '<div class="receipt"><h4>概算お見積り</h4>'+rows+
    '<div class="total-bar" style="border-top:none;padding-bottom:0"><span class="lb">概算合計</span><span class="amt">'+yen(r.total)+(r.from?'〜':'')+'</span></div></div>'+
    '<p class="note">※ 表示は目安の概算です。「〜」が付く項目は最低金額を示しています。最終金額は撮影内容により変動する場合があります。正式なお見積り・ご相談はご予約フォームからお気軽にどうぞ。</p>';
  el.log.insertAdjacentHTML('beforeend','<div class="msg bot"><div class="a">'+esc(mark())+'</div><div class="bubble" style="background:#fff;padding:.4rem">'+receipt+'</div></div>');
  scrollLog();

  const bookUrl=STUDIO.bookingUrl||'#';
  el.foot.innerHTML=
    '<a class="btn-primary" href="'+esc(bookUrl)+'" style="margin-bottom:.7rem">この内容で予約・相談する</a>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;gap:1rem">'+
      '<button class="btn-ghost" id="copy-btn" type="button">見積りをコピー</button>'+
      '<button class="btn-ghost" id="restart-btn" type="button">↺ 最初からやり直す</button></div>';
  document.getElementById('restart-btn').onclick=()=>{ for(const k in answers) delete answers[k]; el.log.innerHTML=''; run(); };
  document.getElementById('copy-btn').onclick=()=>copyEstimate(r);
}
function copyEstimate(r){
  const lines=['【'+(STUDIO.name||'')+' 料金概算】'];
  (SIM.questions||[]).filter(q=>qActive(q)&&answered(q)).forEach(q=>lines.push(q.label+'：'+answerLabel(q)));
  lines.push('─────────');
  r.lines.forEach(l=>lines.push((l.value<0?'− ':'＋ ')+l.label.replace(/^\+ /,'')+'  '+(l.value<0?'−':'')+yen(Math.abs(l.value))));
  lines.push('概算合計：'+yen(r.total)+(r.from?'〜':''));
  lines.push('※目安の概算です。最終金額は撮影内容により変動する場合があります。');
  const text=lines.join('\n');
  const done=()=>{ const b=document.getElementById('copy-btn'); if(b){ b.textContent='コピーしました ✓'; setTimeout(()=>b.textContent='見積りをコピー',1800);} };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); done(); }catch(e){} document.body.removeChild(ta);
}

/* ---------- 起動 ---------- */
async function run(){
  await botMsg('こんにちは。'+esc(STUDIO.name||'')+'の料金コンシェルジュです。<br/>'+esc(SIM.intro||'いくつかの質問にお答えいただくと、概算のお見積りをご案内します。'), 500);
  advance();
}
function boot(){
  const data=window.SITE_DATA;
  if(!data){ document.body.classList.add('is-ready'); el.foot.innerHTML='<p class="note">データを読み込めませんでした。時間をおいて再度お試しください。</p>'; return; }
  const studio=data.studios[STUDIO_KEY]; if(!studio) return;
  STUDIO=studio; SIM=studio.simulator||null;

  if(studio.accentColor) document.documentElement.style.setProperty('--accent', studio.accentColor);
  const nm=studio.shortName||studio.name||'';
  document.getElementById('nav-brand').innerHTML=esc(nm.replace(/\.$/,''))+'<span class="b-mark">.</span>';
  document.getElementById('booking-btn').href=studio.bookingUrl||'#';
  document.getElementById('footer-copy').textContent=data.global.copyright;
  document.getElementById('sim-avatar').textContent=mark();
  document.getElementById('sim-name').textContent=(studio.name||'')+' コンシェルジュ';
  document.body.classList.add('is-ready');

  if(!SIM || !SIM.enabled || !(SIM.questions&&SIM.questions.length)){
    botMsg('こんにちは。'+esc(studio.name||'')+'の料金コンシェルジュです。<br/>ただいま料金シミュレーターを準備中です。詳細が決まり次第、こちらでご案内いたします。',500)
      .then(()=>{ el.foot.innerHTML='<a class="btn-primary" href="'+esc(studio.bookingUrl||'#')+'">お問い合わせ・ご予約</a>'; });
    return;
  }
  run();
}
setTimeout(()=>document.body.classList.add('is-ready'), 1500);
boot();
</script>
