<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Plans — Studio</title>
<meta name="description" id="meta-desc" content="撮影プラン一覧"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111010;--off:#fff;--bg:#f8f6f2;--mid:#888078;
  --accent:#b8935a;--border:rgba(17,16,16,.1);
  --serif:'Noto Serif JP',serif;--display:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.8;overflow-x:hidden;opacity:0;transition:opacity .4s var(--ease)}
body.is-ready{opacity:1}
img{max-width:100%;display:block}
a{color:inherit}

/* ─── Shared design tokens (index.html と統一) ─── */
.wrap{max-width:1440px;margin:0 auto;padding:clamp(4rem,10vw,9rem) clamp(1.5rem,5vw,5rem)}
.sec-head{display:flex;align-items:baseline;gap:1.2rem;margin-bottom:clamp(2.5rem,5vw,4.5rem)}
.sec-num{font-family:var(--sans);font-weight:300;font-size:.62rem;letter-spacing:.22em;color:var(--mid)}
.sec-title{font-family:var(--display);font-weight:300;font-style:italic;font-size:clamp(1.6rem,4vw,2.8rem);letter-spacing:-.01em}
.sec-rule{flex:1;height:1px;background:var(--border);min-width:20px}
.section-body-text{font-family:var(--serif);font-weight:300;font-size:.9rem;color:var(--mid);line-height:2.1;white-space:pre-line;margin-bottom:2.5rem}
.btn-line{display:inline-block;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:.85rem 2rem;text-decoration:none;transition:all .3s}
.btn-line:hover{background:var(--ink);color:#fff}
.more-cta{display:flex;justify-content:center;margin-top:3rem}

/* ─── Nav ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid rgba(17,16,16,.12)}
.nav-top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 clamp(1rem,3vw,2.5rem);height:64px;gap:1rem}
.back-link{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:.55rem .9rem;border:1px solid var(--ink);transition:background .2s,color .2s}
.back-link:hover{background:var(--ink);color:#fff}
.nav-brand{font-family:var(--display);font-style:italic;font-weight:300;font-size:1.1rem;letter-spacing:.04em;text-align:center}
.nav-brand .b-mark{color:var(--accent);font-style:normal;font-weight:400}
.nav-right .booking-btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:#fff;text-decoration:none;padding:.6rem 1.1rem;transition:background .25s}
.nav-right .booking-btn:hover{background:var(--accent)}

main{padding-top:64px}

/* ─── Plans grid (index.html の plans-grid と統一) ─── */
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:var(--border)}
.plan-card{background:#fff;padding:0;position:relative;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:background .35s var(--ease)}
.plan-card:hover{background:var(--ink)}
.plan-card-img{aspect-ratio:4/3;width:100%;overflow:hidden;background:#eee}
.plan-card-img-inner{width:100%;height:100%;background-size:cover;background-position:center;transition:transform .7s var(--ease)}
.plan-card:hover .plan-card-img-inner{transform:scale(1.05)}
.plan-card-body{padding:2rem 1.8rem 2.2rem;display:flex;flex-direction:column;flex:1;position:relative}
.plan-tag{position:absolute;top:-1.2rem;right:1.2rem;font-family:var(--sans);font-weight:400;font-size:.55rem;letter-spacing:.1em;color:#fff;background:var(--accent);padding:.2rem .55rem;text-transform:uppercase}
.plan-name{font-family:var(--sans);font-weight:500;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem;color:var(--ink);transition:color .35s}
.plan-price{font-family:var(--display);font-weight:300;font-style:italic;font-size:1.7rem;color:var(--accent);margin-bottom:.9rem;transition:color .35s}
.plan-desc{font-family:var(--serif);font-size:.8rem;color:var(--mid);line-height:1.95;margin-bottom:1rem;flex:1;transition:color .35s}
.plan-meta{font-family:var(--sans);font-weight:300;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);margin-bottom:1rem;transition:color .35s}
.plan-cta{font-family:var(--sans);font-weight:500;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);margin-top:auto;align-self:flex-start;padding-bottom:.3rem;border-bottom:1px solid var(--ink);transition:color .35s,border-color .35s}
.plan-card:hover .plan-name,.plan-card:hover .plan-desc,.plan-card:hover .plan-meta{color:rgba(255,255,255,.75)}
.plan-card:hover .plan-cta{color:#fff;border-bottom-color:#fff}
.plan-card.soon{pointer-events:none;opacity:.7}
.plan-card.soon .plan-price,.plan-card.soon .plan-cta{color:var(--mid);border-bottom-color:var(--mid)}

.plans-soon{display:block;text-align:center;padding:4rem 1.5rem;font-family:var(--display);font-style:italic;font-size:1.25rem;color:var(--mid)}

/* ─── Footer ─── */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:2rem clamp(1.4rem,5vw,3rem);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.2rem;font-family:var(--sans);font-weight:300;font-size:.7rem;letter-spacing:.08em}
.footer-logo{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.1rem;color:#fff;letter-spacing:.04em;text-decoration:none}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;gap:1rem}
.footer-links a{color:rgba(255,255,255,.55);text-decoration:none;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-copy{font-size:.66rem;letter-spacing:.1em}

@media(max-width:560px){
  .nav-top{height:56px;padding:0 .8rem;gap:.6rem}
  main{padding-top:56px}
  .back-link{padding:.45rem .7rem;font-size:.66rem}
  .nav-brand{font-size:.95rem}
  .nav-right .booking-btn{padding:.5rem .8rem;font-size:.62rem}
  .plans-grid{grid-template-columns:1fr;gap:1px}
  .plan-card-body{padding:1.5rem 1.3rem 1.8rem}
  .sec-head{gap:.8rem}
  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-top">
    <a href="./" class="back-link"><span>‹</span> <span>Top</span></a>
    <div class="nav-brand" id="nav-brand">Studio <span class="b-mark">·</span></div>
    <div class="nav-right">
      <a href="#" class="booking-btn" id="booking-btn">予約する</a>
    </div>
  </div>
</nav>

<main>
  <section>
    <div class="wrap">

      <div class="sec-head">
        <span class="sec-num">05</span>
        <h1 class="sec-title">Plans & Pricing</h1>
        <div class="sec-rule"></div>
      </div>

      <p class="section-body-text" style="text-align:center;max-width:640px;margin:0 auto 3rem" id="page-lead">ご希望に合わせて、撮影プランをお選びください。<br/>各プランの詳細・カット数バリエーションは、カードからご覧いただけます。</p>

      <div class="plans-grid" id="pl-grid"></div>

    </div>
  </section>
</main>

<footer>
  <a href="../" class="footer-logo">TRUNKLII</a>
  <ul class="footer-links">
    <li><a href="./">Top</a></li>
    <li><a href="./calendar.html">Calendar</a></li>
    <li><a href="./reservation.html">Reservation</a></li>
    <li><a href="./cancel-policy.html">Cancel Policy</a></li>
  </ul>
  <span class="footer-copy" id="footer-copy"></span>
</footer>

<script src="../site-data.js"></script>
<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function minPriceFromVariants(variants){
  if(!variants || variants.length === 0) return '';
  const nums = variants.map(v=>{
    const m = String(v.price||'').match(/[\d,]+/g);
    return m ? parseInt(m.join('').replace(/,/g,'')) : NaN;
  }).filter(n=>!isNaN(n));
  if(nums.length === 0) return variants[0].price || '';
  const min = Math.min(...nums);
  return `¥${min.toLocaleString()}〜`;
}

function render(){
  const data = window.SITE_DATA;
  if(!data) return;
  const studio = data.studios[STUDIO_KEY];
  if(!studio) return;

  if(studio.accentColor) document.documentElement.style.setProperty('--accent', studio.accentColor);

  const name = studio.shortName || studio.name || '';
  document.getElementById('nav-brand').innerHTML = `${esc(name.replace(/\.$/,''))}<span class="b-mark">.</span>`;

  document.getElementById('booking-btn').href = studio.bookingUrl || '#';
  document.getElementById('footer-copy').textContent = data.global.copyright;
  document.getElementById('page-title').textContent = `Plans | ${studio.name}`;

  const plans = studio.plans || [];
  const grid = document.getElementById('pl-grid');

  if(plans.length === 0){
    grid.innerHTML = '<div class="plans-soon" style="grid-column:1/-1">プラン情報は近日公開予定です。</div>';
    document.body.classList.add('is-ready');
    return;
  }

  grid.innerHTML = plans.map(p=>{
    const hasDetail = p.detail && p.variants && p.variants.length > 0;
    const heroImg = hasDetail ? (p.detail.heroImage || '') : '';
    const price = hasDetail ? minPriceFromVariants(p.variants) : '';
    const cutsList = hasDetail ? p.variants.map(v=>v.cuts).filter(c=>c!=null).join(' / ') : '';
    const cardClass = hasDetail ? 'plan-card' : 'plan-card soon';
    const cardHref = hasDetail ? `plan-detail.html?key=${encodeURIComponent(p.key)}` : 'javascript:void(0)';

    return `
      <a href="${cardHref}" class="${cardClass}">
        <div class="plan-card-img">${heroImg ? `<div class="plan-card-img-inner" style="background-image:url('${esc(heroImg)}')"></div>` : ''}</div>
        <div class="plan-card-body">
          ${p.tag ? `<div class="plan-tag">${esc(p.tag)}</div>` : ''}
          <div class="plan-name">${esc(p.name)}</div>
          <div class="plan-price">${esc(price || '近日公開')}</div>
          <div class="plan-desc">${esc(p.desc || '')}</div>
          ${cutsList ? `<div class="plan-meta">${esc(cutsList)} cuts available</div>` : ''}
          <div class="plan-cta">${hasDetail ? 'View detail →' : 'Coming soon'}</div>
        </div>
      </a>
    `;
  }).join('');

  document.body.classList.add('is-ready');
}

setTimeout(()=>document.body.classList.add('is-ready'), 1200);
render();
</script>
</body>
</html>
