<script src="../site-data.js"></script>
<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function minPriceFromVariants(variants){
  if(!variants || variants.length === 0) return '';
  const nums = variants.map(v=>{
    const m = String(v.price||'').match(/[\d,]+/g);
    return m ? parseInt(m.join('').replace(/,/g,'')) : NaN;
  }).filter(n=>!isNaN(n));
  if(nums.length === 0) return variants[0].price || '';
  const min = Math.min(...nums);
  return `¥${min.toLocaleString()}〜`;
}

function render(){
  const data = window.SITE_DATA;
  if(!data) return;
  const studio = data.studios[STUDIO_KEY];
  if(!studio) return;

  if(studio.accentColor) document.documentElement.style.setProperty('--accent', studio.accentColor);

  const name = studio.shortName || studio.name || '';
  document.getElementById('nav-brand').innerHTML = '<img src="../assets/nr-logo.png" alt="Maison nr." style="height:34px;width:auto;display:block;margin:0 auto;filter:brightness(0)"/>';

  document.getElementById('footer-copy').textContent = data.global.copyright;
  document.getElementById('page-title').textContent = `Plans | ${studio.name}`;

  if(studio.plansLead){
    document.getElementById('page-lead').innerHTML = esc(studio.plansLead).replace(/\n/g,'<br/>');
  }

  const plans = studio.plans || [];
  const grid = document.getElementById('pl-grid');

  if(plans.length === 0){
    grid.innerHTML = '<div class="plans-soon" style="grid-column:1/-1">プラン情報は近日公開予定です。</div>';
    document.body.classList.add('is-ready');
    return;
  }

  grid.innerHTML = plans.map(p=>{
    const hasDetail = p.detail && p.variants && p.variants.length > 0;
    const heroImg = hasDetail ? (p.detail.heroImage || '') : '';
    const price = hasDetail ? minPriceFromVariants(p.variants) : '';
    const cutsList = hasDetail ? p.variants.map(v=>v.cuts).filter(c=>c!=null).join(' / ') : '';
    const cardClass = hasDetail ? 'plan-card' : 'plan-card soon';
    const cardHref = hasDetail ? `plan-detail.html?key=${encodeURIComponent(p.key)}` : 'javascript:void(0)';

    return `
      <a href="${cardHref}" class="${cardClass}">
        <div class="plan-card-img">${heroImg ? `<div class="plan-card-img-inner" style="background-image:url('${esc(heroImg)}')"></div>` : ''}</div>
        <div class="plan-card-body">
          ${p.tag ? `<div class="plan-tag">${esc(p.tag)}</div>` : ''}
          <div class="plan-name">${esc(p.name)}</div>
          <div class="plan-price">${esc(price || '近日公開')}</div>
          <div class="plan-desc">${esc(p.desc || '')}</div>
          ${cutsList ? `<div class="plan-meta">${esc(cutsList)} cuts available</div>` : ''}
          <div class="plan-cta">${hasDetail ? 'View detail →' : 'Coming soon'}</div>
        </div>
      </a>
    `;
  }).join('');

  document.body.classList.add('is-ready');
}

setTimeout(()=>document.body.classList.add('is-ready'), 1200);
render();
</script>
<script>
// 予約する › 展開メニュー(TOPページと同仕様)
function toggleHdrBook(e){
  e.stopPropagation();
  const wrap = e.currentTarget.closest('.hdr-book-wrap');
  const m = wrap.querySelector('.hdr-book-menu');
  const open = m.hidden;
  document.querySelectorAll('.hdr-book-menu').forEach(x=>{ x.hidden = true; });
  document.querySelectorAll('.hdr-book-toggle').forEach(b=>b.setAttribute('aria-expanded','false'));
  m.hidden = !open;
  e.currentTarget.setAttribute('aria-expanded', open ? 'true' : 'false');
}
(function(){
  function closeIfOutside(ev){
    if(!(ev.target instanceof Element) || !ev.target.closest('.hdr-book-wrap')){
      document.querySelectorAll('.hdr-book-menu').forEach(x=>{ x.hidden = true; });
      document.querySelectorAll('.hdr-book-toggle').forEach(b=>b.setAttribute('aria-expanded','false'));
    }
  }
  document.addEventListener('pointerdown', closeIfOutside, {capture:true, passive:true});
  document.addEventListener('touchstart', closeIfOutside, {capture:true, passive:true});
  // ヘッダーのマップ/Instagram リンクを site-data から設定
  var key = location.pathname.includes('/nr/') ? 'nr' : 'et';
  var d = (window.SITE_DATA && SITE_DATA.studios) ? SITE_DATA.studios[key] : null;
  if(d){
    var m=document.getElementById('sub-map'); if(m && d.mapUrl) m.href=d.mapUrl;
    var g=document.getElementById('sub-ig'); if(g && d.instagram) g.href=d.instagram;
  }
})();
</script>
<script>
// フロート: トップへ戻る + 予約シート開閉(TOPページ準拠)
(function(){
  var b=document.getElementById('to-top-btn');
  if(b){ window.addEventListener('scroll', function(){ b.classList.toggle('show', window.scrollY>400); }, {passive:true}); }
})();
function openBookSheet(){
  var s=document.getElementById('book-sheet'); if(s) s.hidden=false;
  document.body.classList.add('sheet-open');
  var t=document.getElementById('book-toggle'); if(t) t.hidden=true;
}
function closeBookSheet(){
  var s=document.getElementById('book-sheet'); if(s) s.hidden=true;
  document.body.classList.remove('sheet-open');
  var t=document.getElementById('book-toggle'); if(t) t.hidden=false;
}
</script>
