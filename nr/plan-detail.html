<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  --ink:#111010;--off:#fff;--bg:#f8f6f2;--mid:#888078;

<script>
const STUDIO_KEY = location.pathname.includes('/nr/') ? 'nr' : 'et';
function getParam(name){ return new URLSearchParams(location.search).get(name); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function renderNotFound(reason){
  document.getElementById('content').innerHTML = `
    <div class="pd-notfound">
      <div>${esc(reason || 'プランが見つかりませんでした')}</div>
      <a href="plans.html">プラン一覧に戻る</a>
    </div>`;
  document.body.classList.add('is-ready');
}

function render(){
  const data = window.SITE_DATA;
  if(!data) return renderNotFound('データを読み込めませんでした');
  const studio = data.studios[STUDIO_KEY];
  if(!studio) return renderNotFound();

  if(studio.accentColor){
    document.documentElement.style.setProperty('--accent', studio.accentColor);
  }

  const brandEl = document.getElementById('nav-brand');
  brandEl.innerHTML = '<img src="../assets/nr-logo.png" alt="Maison nr." style="height:34px;width:auto;display:block;margin:0 auto;filter:brightness(0)"/>';
  document.getElementById('footer-copy').textContent = data.global.copyright;

  const key = getParam('key');
  if(!key) return renderNotFound('プランが指定されていません');
  const plan = (studio.plans || []).find(p=>p.key===key);
  if(!plan) return renderNotFound('指定されたプランが見つかりませんでした');

  if(!plan.detail || !plan.variants || plan.variants.length === 0){
    document.getElementById('page-title').textContent = `${plan.name} — ${studio.name}`;
    document.getElementById('content').innerHTML = `
      <div class="pd-notfound">
        <div>${esc(plan.name)} の詳細は近日公開予定です</div>
        <a href="plans.html">プラン一覧へ戻る</a>
      </div>`;
    document.body.classList.add('is-ready');
    return;
  }

  const d = plan.detail;
  document.getElementById('page-title').textContent = `${plan.name} | ${studio.name}`;
  const metaDesc = document.getElementById('meta-desc') || document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content',
    `${plan.name} — ${d.tagline || plan.desc || ''} ${studio.name}の撮影プラン詳細。`);

  const variantsHtml = plan.variants.map(v=>{
    const includes = (v.includes||[]).map(it=>`<li>${esc(it)}</li>`).join('');
    const options = (v.options||[]).map(o=>`
      <div class="opt-row">
        <div class="pd-opt-name">${esc(o.name)}</div>
        <div class="pd-opt-price">${esc(o.price)}</div>
      </div>`).join('');
    const gallery = (v.gallery||[]).map((g,i)=>`
      <a href="javascript:void(0)" onclick="openLb('${esc(g)}')"><img src="${esc(g)}" alt="${esc(plan.name)} ${esc(v.label)} ${i+1}" loading="lazy"/></a>
    `).join('');
    return `
      <article class="pd-variant">
        <div class="pd-variant-label">${esc(v.cuts != null ? v.cuts + ' cuts' : 'Variant')}</div>
        <div class="pd-variant-name">${esc(v.label)}</div>
        <div class="pd-variant-price">${esc(v.price)}</div>
        ${v.duration?`<div class="pd-variant-duration">撮影時間 ${esc(v.duration)}</div>`:'<div class="pd-variant-duration"></div>'}
        ${v.description?`<div class="pd-variant-desc">${esc(v.description)}</div>`:''}
        ${includes?`<div class="pd-sub-heading">Includes</div><ul class="pd-list">${includes}</ul>`:''}
        ${options?`<div class="pd-sub-heading">Options</div><div class="pd-options">${options}</div>`:''}
        ${gallery?`<div class="pd-sub-heading">Gallery</div><div class="pd-vgallery">${gallery}</div>`:''}
        <div class="pd-variant-cta"><a href="${esc(studio.bookingUrl||'#')}">このプランで予約する →</a></div>
      </article>
    `;
  }).join('');

  const heroImg = d.heroImage || '';

  document.getElementById('content').innerHTML = `
    <section class="pd-hero">
      ${heroImg?`<div class="pd-hero-img" style="background-image:url('${esc(heroImg)}')"></div>`:''}
      <div class="pd-hero-text">
        <div class="pd-hero-tag">${esc(plan.tag || 'Plan')}</div>
        <h1 class="pd-hero-name">${esc(plan.name)}</h1>
        ${d.tagline?`<div class="pd-hero-tagline">${esc(d.tagline)}</div>`:''}
      </div>
    </section>

    <section>
      <div class="wrap">

        ${d.longDescription?`
          <div class="sec-head">
            <span class="sec-num">01</span>
            <h2 class="sec-title">About this plan</h2>
            <div class="sec-rule"></div>
          </div>
          <div class="pd-about"><p>${esc(d.longDescription)}</p></div>
        `:''}

        <div class="sec-head">
          <span class="sec-num">02</span>
          <h2 class="sec-title">Choose your plan</h2>
          <div class="sec-rule"></div>
        </div>
        <p class="section-body-text" style="text-align:center;max-width:560px;margin:0 auto 3rem">カット数からお選びください。</p>

        <div class="pd-variants">${variantsHtml}</div>

        ${d.notes?`
          <div class="sec-head" style="margin-top:4rem">
            <span class="sec-num">03</span>
            <h2 class="sec-title">Notes</h2>
            <div class="sec-rule"></div>
          </div>
          <div class="pd-notes">
            <div class="pd-notes-head">ご利用にあたって</div>${esc(d.notes)}
          </div>
        `:''}

        <div class="pd-cta">
          <div class="pd-cta-text">ご予約・お問い合わせ</div>
          <a href="${esc(studio.bookingUrl||'#')}" class="btn-line filled">予約フォームへ →</a>
        </div>

      </div>
    </section>
  `;

  document.body.classList.add('is-ready');
}

function openLb(src){
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('open');
}
function closeLb(){ document.getElementById('lb').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLb(); });
setTimeout(()=>document.body.classList.add('is-ready'), 1200);
render();
</script>
</body>
</html>
