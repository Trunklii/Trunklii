<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Studio — Trunklii</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../common.css"/>
<style>
/* ═══ ABOUT ═══ */

.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(3rem,7vw,8rem);align-items:center}
.about-text p{font-family:var(--serif);font-weight:300;font-size:clamp(.85rem,1.4vw,.95rem);color:var(--mid);white-space:pre-line;line-height:2.2;margin-bottom:2.2rem}
.about-img-wrap{position:relative}
.about-img-wrap img{width:100%;height:clamp(300px,50vw,560px);object-fit:cover;display:block}
.about-img-wrap::before{content:'';position:absolute;top:-10px;left:-10px;right:10px;bottom:10px;border:1px solid var(--border);z-index:-1}
.btn-line{display:inline-block;font-family:var(--sans);font-weight:500;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:.85rem 2rem;text-decoration:none;transition:all .3s}
.btn-line:hover{background:var(--ink);color:#fff}

/* GALLERY */
.g-filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:2.5rem}
.g-filter{background:none;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);font-weight:400;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);padding:.42rem 1rem;transition:all .25s}
.g-filter.active,.g-filter:hover{background:var(--ink);border-color:var(--ink);color:#fff}
.g-grid{columns:3;column-gap:1rem}
.g-item{break-inside:avoid;margin-bottom:1rem;overflow:hidden;position:relative;cursor:pointer}
.g-item img{width:100%;display:block;transition:transform .7s var(--ease)}
.g-item:hover img{transform:scale(1.04)}
.g-cap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(17,16,16,.55));color:#fff;font-family:var(--display);font-style:italic;font-size:.78rem;letter-spacing:.06em;padding:2rem .75rem .6rem;opacity:0;transition:opacity .3s}
.g-item:hover .g-cap{opacity:1}
.g-item.hidden{display:none}

/* ITEMS (kimono / costume / goods) */
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.item-card{position:relative;overflow:hidden;cursor:pointer}
.item-card img{width:100%;height:clamp(200px,28vw,340px);object-fit:cover;display:block;transition:transform .7s var(--ease)}
.item-card:hover img{transform:scale(1.04)}
.item-info{padding:1rem .2rem .5rem}
.item-name{font-family:var(--sans);font-weight:500;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
.item-price{font-family:var(--display);font-style:italic;font-size:1rem;color:var(--accent);margin-top:.25rem}
.item-desc{font-family:var(--serif);font-size:.72rem;color:var(--mid);margin-top:.3rem}

/* PLANS */
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1px;background:var(--border)}
.plan-card{background:#fff;padding:2.2rem 1.8rem;transition:background .35s;position:relative}
.plan-card:hover{background:var(--ink)}
.plan-tag{position:absolute;top:1.2rem;right:1.2rem;font-family:var(--sans);font-weight:400;font-size:.55rem;letter-spacing:.1em;color:#fff;background:var(--accent);padding:.18rem .55rem;text-transform:uppercase}
.plan-name{font-family:var(--sans);font-weight:500;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem;color:var(--ink);transition:color .35s}
.plan-price{font-family:var(--display);font-weight:300;font-style:italic;font-size:1.7rem;color:var(--accent);margin-bottom:.9rem;transition:color .35s}
.plan-desc{font-family:var(--serif);font-size:.78rem;color:var(--mid);line-height:1.9;transition:color .35s}
.plan-card:hover .plan-name,.plan-card:hover .plan-desc{color:rgba(255,255,255,.75)}

/* CALENDAR */
.cal-block{
  background:#fff;border:1px solid var(--border);
  padding:clamp(2rem,5vw,4rem);text-align:center;
}
.cal-placeholder{
  font-family:var(--display);font-style:italic;font-size:1.2rem;
  color:var(--mid);padding:3rem 1rem;
}
.cal-note{
  margin-top:1.5rem;font-family:var(--display);font-style:italic;
  font-size:.85rem;color:var(--accent);letter-spacing:.04em;
}
.cal-embed{width:100%;min-height:480px;border:none}

/* RESERVATION */
.res-block{
  background:#fff;border:1px solid var(--border);
  padding:clamp(2rem,5vw,4rem);
}
.res-cta{text-align:center;margin-top:2rem}
.btn-fill{
  display:inline-block;font-family:var(--sans);font-weight:600;font-size:.78rem;
  letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--ink);
  text-decoration:none;padding:1rem 2.5rem;transition:background .25s;
}
.btn-fill:hover{background:var(--accent)}

/* CANCEL POLICY */
.cancel-table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
.cancel-table tr{border-bottom:1px solid var(--border)}
.cancel-table tr:last-child{border-bottom:none}
.cancel-table th{
  font-family:var(--sans);font-weight:500;font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--mid);
  padding:1rem 1rem 1rem 0;text-align:left;width:60%;
}
.cancel-table td{
  font-family:var(--display);font-style:italic;font-size:1.1rem;
  color:var(--accent);padding:1rem 0;text-align:right;
}
.cancel-table tbody tr td:first-child{
  font-family:var(--serif);font-style:normal;font-size:.85rem;
  color:var(--ink);text-align:left;padding-right:1rem;
}

/* Q&A */
.qa-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--border)}
.qa-item{border-bottom:1px solid var(--border)}
.qa-q{
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
  padding:1.4rem 0;cursor:pointer;width:100%;background:none;border:none;
  font-family:var(--sans);font-weight:500;font-size:.92rem;
  letter-spacing:.02em;color:var(--ink);text-align:left;
}
.qa-q-mark{color:var(--accent);font-family:var(--display);font-style:italic;font-size:1.1rem;margin-right:.3rem}
.qa-q-text{flex:1}
.qa-toggle{font-size:1rem;color:var(--ink);transition:transform .3s;flex-shrink:0;margin-top:.1rem}
.qa-item.open .qa-toggle{transform:rotate(45deg)}
.qa-a{
  max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;
  font-family:var(--serif);font-weight:300;font-size:.85rem;color:var(--mid);line-height:2.1;
}
.qa-item.open .qa-a{max-height:600px;padding:0 0 1.4rem 1.7rem}

/* FLOW */
.flow-wrap{max-width:780px;margin:0 auto;position:relative}
.flow-step{position:relative;display:grid;grid-template-columns:80px 1fr;gap:2rem;padding:1.8rem 0;align-items:start}
.flow-step + .flow-step{border-top:1px solid var(--border)}
.flow-num{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:var(--ink);color:#fff;font-family:var(--display);font-style:italic;font-weight:300;font-size:1.7rem;letter-spacing:-.02em;flex-shrink:0;position:relative;z-index:2}
.flow-step:not(:last-child)::before{content:'';position:absolute;left:32px;top:88px;bottom:-24px;width:1px;background:var(--border);z-index:1}
.flow-step:not(:last-child)::after{content:'';position:absolute;left:27px;bottom:-30px;width:11px;height:11px;border-right:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(45deg);z-index:1}
.flow-body{padding-top:.4rem}
.flow-title{font-family:var(--sans);font-weight:500;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);margin-bottom:.5rem}
.flow-desc{font-family:var(--serif);font-weight:300;font-size:.85rem;color:var(--mid);line-height:2}
.flow-note{display:inline-block;margin-top:.6rem;font-family:var(--display);font-style:italic;font-size:.78rem;color:var(--accent);letter-spacing:.04em;padding:.25rem .75rem;border:1px solid rgba(184,147,90,.3);background:rgba(184,147,90,.05)}

/* RECRUIT */
.recruit-body{display:grid;grid-template-columns:1fr 1fr;gap:clamp(3rem,6vw,6rem);align-items:start}
.recruit-copy{font-family:var(--serif);font-weight:300;font-size:.9rem;color:var(--mid);line-height:2.1;white-space:pre-line;margin-bottom:2rem}
.pos-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.pos-card{background:#fff;padding:1.6rem 1.8rem}
.pos-title{font-family:var(--sans);font-weight:500;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin-bottom:.35rem}
.pos-type{font-family:var(--sans);font-weight:400;font-size:.65rem;letter-spacing:.08em;color:var(--accent);margin-bottom:.5rem;text-transform:uppercase}
.pos-desc{font-family:var(--serif);font-size:.78rem;color:var(--mid);line-height:1.8}

/* CTA */
.cta{background:var(--ink);color:#fff;text-align:center;padding:clamp(4rem,9vw,8rem) 2rem}
.cta h2{font-family:var(--display);font-weight:300;font-style:italic;font-size:clamp(2rem,5vw,4rem);letter-spacing:-.01em;white-space:pre-line;line-height:1.3;margin-bottom:1.5rem}
.cta p{font-family:var(--display);font-style:italic;font-size:.85rem;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:2.5rem}
.btn-line-light{display:inline-block;font-family:var(--sans);font-weight:500;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;border:1px solid rgba(255,255,255,.35);padding:.95rem 2.4rem;text-decoration:none;transition:all .3s}
.btn-line-light:hover{background:#fff;color:var(--ink)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:400;background:rgba(17,16,16,.93);backdrop-filter:blur(10px);align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-img{max-width:92vw;max-height:90vh;object-fit:contain}
.lb-close{position:absolute;top:1.5rem;right:1.8rem;font-size:1.2rem;color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none}
.lb-close:hover{color:#fff}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:.8rem;padding:.6rem .9rem;cursor:pointer}
.lb-prev{left:1.5rem}.lb-next{right:1.5rem}
.lb-prev:hover,.lb-next:hover{color:#fff;border-color:rgba(255,255,255,.5)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:2rem clamp(1.5rem,5vw,4rem);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.2rem;background:#fff}
.footer-logo{font-family:var(--sans);font-weight:300;font-size:.85rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink);text-decoration:none}
.footer-links{display:flex;gap:1.2rem;list-style:none;flex-wrap:wrap}
.footer-links a{font-family:var(--sans);font-weight:400;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--ink)}
.footer-copy{font-size:.62rem;letter-spacing:.06em;color:var(--mid)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1200px){
  .nav-link{padding:0 .65rem;font-size:.65rem}
}
@media(max-width:960px){
  .nav-top{grid-template-columns:auto 1fr auto;height:60px}
  .brand-tabs{display:none}
  .nav-bot{display:none}
  .hamburger{display:flex;position:relative;left:0;top:0;transform:none}
  .nav-right{gap:.4rem}
  .icon-btn{width:32px;height:32px}
  .nav-logo{height:30px}
  .hero{height:calc(100vh - 60px);margin-top:60px}
  .about-grid,.recruit-body{grid-template-columns:1fr}
  .about-img-wrap{order:-1}
  .g-grid{columns:2}
  .items-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  .g-grid{columns:1}
  .items-grid{grid-template-columns:1fr}
  .plans-grid{grid-template-columns:1fr}
  footer{flex-direction:column;text-align:center}
  .footer-links{justify-content:center}
  .flow-step{grid-template-columns:50px 1fr;gap:1.2rem}
  .flow-num{width:46px;height:46px;font-size:1.2rem}
  .flow-step:not(:last-child)::before{left:23px;top:64px}
  .flow-step:not(:last-child)::after{left:18px}
  .qa-bot{right:.75rem;left:.75rem;width:auto;max-width:none}
}
</style>
</head>
<body>

<div id="trunklii-nav-mount"></div>

<!-- HERO -->
<section class="hero" id="hero">
  <div id="hero-slides"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow" id="hero-eyebrow">Trunklii</div>
    <div class="hero-name" id="hero-name">et.</div>
    <div class="hero-tagline" id="hero-tagline"></div>
  </div>
  <div class="hero-dots" id="hero-dots"></div>
</section>

<!-- ABOUT 01 -->
<section id="about" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">01</span><h2 class="sec-title" id="about-heading">About</h2><div class="sec-rule"></div></div>
  <div class="about-grid">
    <div class="about-text">
      <p id="about-body"></p>
      <a href="#booking" class="btn-line" id="about-btn">予約する →</a>
    </div>
    <div class="about-img-wrap"><img id="about-img" src="" alt="Studio"/></div>
  </div>
</div>
</section>

<!-- GALLERY 02 -->
<section id="gallery" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">02</span><h2 class="sec-title">Gallery</h2><div class="sec-rule"></div></div>
  <div class="g-filters">
    <button class="g-filter active" onclick="filterGallery('all',this)">All</button>
    <button class="g-filter" onclick="filterGallery('753',this)">七五三</button>
    <button class="g-filter" onclick="filterGallery('newborn',this)">Newborn</button>
    <button class="g-filter" onclick="filterGallery('birthday',this)">Birthday</button>
    <button class="g-filter" onclick="filterGallery('family',this)">Family</button>
    <button class="g-filter" onclick="filterGallery('maternity',this)">Maternity</button>
  </div>
  <div class="g-grid" id="g-grid"></div>
</div>
</section>

<!-- KIMONO 03 -->
<section id="kimono" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">03</span><h2 class="sec-title" id="kimono-heading">Kimono</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="kimono-body"></p>
  <div class="items-grid" id="kimono-grid"></div>
</div>
</section>

<!-- COSTUME 04 -->
<section id="costume" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">04</span><h2 class="sec-title" id="costume-heading">Costume</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="costume-body"></p>
  <div class="items-grid" id="costume-grid"></div>
</div>
</section>

<!-- PLANS 05 -->
<section id="plans" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">05</span><h2 class="sec-title">Plans & Pricing</h2><div class="sec-rule"></div></div>
  <div class="plans-grid" id="plans-grid"></div>
</div>
</section>

<!-- GOODS 06 -->
<section id="goods" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">06</span><h2 class="sec-title" id="goods-heading">Goods</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="goods-body"></p>
  <div class="items-grid" id="goods-grid"></div>
</div>
</section>

<!-- CALENDAR 07 -->
<section id="calendar" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">07</span><h2 class="sec-title" id="calendar-heading">Calendar</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="calendar-body" style="text-align:center;max-width:640px;margin:0 auto 2.5rem"></p>
  <div class="cal-block" id="calendar-block"></div>
</div>
</section>

<!-- RESERVATION 08 -->
<section id="reservation" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">08</span><h2 class="sec-title" id="reservation-heading">Reservation</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="reservation-body" style="text-align:center;max-width:640px;margin:0 auto 2.5rem"></p>
  <div class="res-block" id="reservation-block"></div>
</div>
</section>

<!-- CANCEL POLICY 09 -->
<section id="cancel-policy" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">09</span><h2 class="sec-title" id="cancel-heading">Cancellation Policy</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="cancel-body" style="max-width:780px;margin:0 auto 2.5rem"></p>
  <div style="max-width:780px;margin:0 auto" id="cancel-block"></div>
</div>
</section>

<!-- Q&A 10 -->
<section id="qa" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">10</span><h2 class="sec-title" id="qa-heading">Q & A</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="qa-body" style="text-align:center;max-width:640px;margin:0 auto 2.5rem"></p>
  <div style="max-width:780px;margin:0 auto"><div class="qa-list" id="qa-list"></div></div>
</div>
</section>

<!-- FLOW 11 -->
<section id="flow" style="background:var(--bg)">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">11</span><h2 class="sec-title" id="flow-heading">Flow</h2><div class="sec-rule"></div></div>
  <p class="section-body-text" id="flow-body" style="text-align:center;max-width:600px;margin:0 auto 3.5rem"></p>
  <div class="flow-wrap" id="flow-list"></div>
</div>
</section>

<!-- RECRUIT 12 -->
<section id="recruit" style="background:#f0eee9">
<div class="wrap">
  <div class="sec-head"><span class="sec-num">12</span><h2 class="sec-title" id="recruit-heading">Recruit</h2><div class="sec-rule"></div></div>
  <div class="recruit-body">
    <div>
      <p class="recruit-copy" id="recruit-body"></p>
      <a href="#" class="btn-line" id="recruit-contact">お問い合わせ →</a>
    </div>
    <div class="pos-list" id="pos-list"></div>
  </div>
</div>
</section>

<!-- CTA -->
<section class="cta" id="booking">
  <h2 id="cta-heading"></h2>
  <p id="cta-note"></p>
  <a href="#" class="btn-line-light" id="cta-btn">予約する</a>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-prev" onclick="lbNav(-1)">‹</button>
  <img class="lb-img" id="lb-img" src="" alt=""/>
  <button class="lb-next" onclick="lbNav(1)">›</button>
</div>

<div id="trunklii-footer-mount"></div>

<script src="../site-data.js"></script>
<script src="../common.js"></script>
<script>
const STUDIO_KEY = window.TRUNKLII.STUDIO;
let heroTimer, lbImages=[], lbIdx=0;

async function init(){
  const d = window.SITE_DATA.studios[STUDIO_KEY];
  const g = window.SITE_DATA.global;
  if(!d) return;

  document.documentElement.style.setProperty('--accent', d.accentColor);
  document.getElementById('page-title').textContent = d.name + ' — Trunklii';

  TRUNKLII_INIT('');

  // Hero
  document.getElementById('hero-eyebrow').textContent = 'Trunklii / ' + d.name;
  document.getElementById('hero-name').textContent = d.shortName;
  document.getElementById('hero-tagline').textContent = d.tagline;
  buildHero(d.heroImages);

  // About
  document.getElementById('about-heading').textContent = d.about.heading;
  document.getElementById('about-body').textContent = d.about.body;
  document.getElementById('about-img').src = d.about.image;
  document.getElementById('about-btn').textContent = d.bookingLabel + ' →';
  document.getElementById('about-btn').href = d.bookingUrl;

  // Gallery
  lbImages = d.gallery.map(i=>i.file);
  document.getElementById('g-grid').innerHTML = d.gallery.map((item,i)=>`
    <div class="g-item" data-cat="${item.category}">
      <img src="${item.file}" alt="${item.caption}" loading="lazy" onclick="openLb(${i})"/>
      <div class="g-cap">${item.caption}</div>
    </div>
  `).join('');

  // Kimono
  document.getElementById('kimono-heading').textContent = d.kimono.heading;
  document.getElementById('kimono-body').textContent = d.kimono.body;
  document.getElementById('kimono-grid').innerHTML = d.kimono.items.map(item=>`
    <div class="item-card"><img src="${item.file}" alt="${item.name}" loading="lazy" onclick="openLbSrc('${item.file}')"/>
    <div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div></div></div>
  `).join('') || '<p style="color:var(--mid);font-size:.85rem;font-family:var(--display);font-style:italic;padding:1.5rem">近日公開予定。</p>';

  // Costume
  document.getElementById('costume-heading').textContent = d.costume.heading;
  document.getElementById('costume-body').textContent = d.costume.body;
  document.getElementById('costume-grid').innerHTML = d.costume.items.map(item=>`
    <div class="item-card"><img src="${item.file}" alt="${item.name}" loading="lazy" onclick="openLbSrc('${item.file}')"/>
    <div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div></div></div>
  `).join('') || '<p style="color:var(--mid);font-size:.85rem;font-family:var(--display);font-style:italic;padding:1.5rem">近日公開予定。</p>';

  // Plans
  document.getElementById('plans-grid').innerHTML = d.plans.map(p=>`
    <div class="plan-card">
      ${p.tag?`<div class="plan-tag">${p.tag}</div>`:''}
      <div class="plan-name">${p.name}</div>
      <div class="plan-price">${p.price}</div>
      <div class="plan-desc">${p.desc}</div>
    </div>
  `).join('');

  // Goods
  if(d.goods){
    document.getElementById('goods-heading').textContent = d.goods.heading;
    document.getElementById('goods-body').textContent = d.goods.body;
    document.getElementById('goods-grid').innerHTML = d.goods.items.map(item=>`
      <div class="item-card">
        <img src="${item.file}" alt="${item.name}" loading="lazy" onclick="openLbSrc('${item.file}')"/>
        <div class="item-info"><div class="item-name">${item.name}</div><div class="item-price">${item.price||''}</div><div class="item-desc">${item.desc}</div></div>
      </div>
    `).join('') || '<p style="color:var(--mid);font-size:.85rem;font-family:var(--display);font-style:italic">近日公開予定。</p>';
  }

  // Calendar
  if(d.calendar){
    document.getElementById('calendar-heading').textContent = d.calendar.heading;
    document.getElementById('calendar-body').textContent = d.calendar.body;
    const calBlock = document.getElementById('calendar-block');
    calBlock.innerHTML = d.calendar.embedUrl
      ? `<iframe class="cal-embed" src="${d.calendar.embedUrl}" frameborder="0"></iframe>${d.calendar.note?`<div class="cal-note">${d.calendar.note}</div>`:''}`
      : `<div class="cal-placeholder">カレンダー準備中</div>${d.calendar.note?`<div class="cal-note">${d.calendar.note}</div>`:''}`;
  }

  // Reservation
  if(d.reservation){
    document.getElementById('reservation-heading').textContent = d.reservation.heading;
    document.getElementById('reservation-body').textContent = d.reservation.body;
    const resBlock = document.getElementById('reservation-block');
    resBlock.innerHTML = d.reservation.formUrl
      ? `<iframe class="cal-embed" src="${d.reservation.formUrl}" frameborder="0"></iframe>${d.reservation.note?`<div class="cal-note">${d.reservation.note}</div>`:''}<div class="res-cta"><a href="${d.bookingUrl}" class="btn-fill">予約フォームへ →</a></div>`
      : `<div class="cal-placeholder">予約受付準備中</div>${d.reservation.note?`<div class="cal-note">${d.reservation.note}</div>`:''}<div class="res-cta"><a href="${d.bookingUrl}" class="btn-fill">予約フォームへ →</a></div>`;
  }

  // Cancel Policy
  if(d.cancelPolicy){
    document.getElementById('cancel-heading').textContent = d.cancelPolicy.heading;
    document.getElementById('cancel-body').textContent = d.cancelPolicy.body;
    const cb = document.getElementById('cancel-block');
    cb.innerHTML = d.cancelPolicy.items.length
      ? `<table class="cancel-table">
          <thead><tr><th>キャンセル時期</th><th style="text-align:right">キャンセル料</th></tr></thead>
          <tbody>${d.cancelPolicy.items.map(it=>`<tr><td>${it.when}</td><td>${it.fee}</td></tr>`).join('')}</tbody>
        </table>
        ${d.cancelPolicy.note?`<p style="font-family:var(--serif);font-size:.8rem;color:var(--mid);font-style:italic;text-align:center;margin-top:1.5rem">${d.cancelPolicy.note}</p>`:''}`
      : '<p style="text-align:center;color:var(--mid);font-family:var(--display);font-style:italic;font-size:1rem">近日公開予定。</p>';
  }

  // Q&A
  if(d.qa){
    document.getElementById('qa-heading').textContent = d.qa.heading;
    document.getElementById('qa-body').textContent = d.qa.body;
    document.getElementById('qa-list').innerHTML = d.qa.items.map((it,i)=>`
      <div class="qa-item">
        <button class="qa-q" onclick="toggleQa(${i})">
          <span class="qa-q-mark">Q.</span><span class="qa-q-text">${it.q}</span><span class="qa-toggle">+</span>
        </button>
        <div class="qa-a">${it.a}</div>
      </div>
    `).join('') || '<p style="text-align:center;color:var(--mid);font-family:var(--display);font-style:italic">近日公開予定。</p>';
  }

  // Flow
  document.getElementById('flow-heading').textContent = d.flow.heading;
  document.getElementById('flow-body').textContent = d.flow.body;
  document.getElementById('flow-list').innerHTML = d.flow.steps.map((s,i)=>`
    <div class="flow-step">
      <div class="flow-num">${String(i+1).padStart(2,'0')}</div>
      <div class="flow-body">
        <div class="flow-title">${s.title}</div>
        <div class="flow-desc">${s.desc}</div>
        ${s.note ? `<div class="flow-note">＊${s.note}</div>` : ''}
      </div>
    </div>
  `).join('');

  // Recruit
  document.getElementById('recruit-heading').textContent = d.recruit.heading;
  document.getElementById('recruit-body').textContent = d.recruit.body;
  document.getElementById('recruit-contact').href = 'mailto:' + d.recruit.contactEmail;
  document.getElementById('pos-list').innerHTML = d.recruit.positions.map(p=>`
    <div class="pos-card"><div class="pos-title">${p.title}</div><div class="pos-type">${p.type}</div><div class="pos-desc">${p.desc}</div></div>
  `).join('') || '<p style="color:var(--mid);font-size:.85rem;font-family:var(--display);font-style:italic;padding:1.5rem">近日公開予定。</p>';

  // CTA
  document.getElementById('cta-heading').textContent = d.ctaHeading;
  document.getElementById('cta-note').textContent = d.ctaNote;
  const ctaBtn = document.getElementById('cta-btn');
  ctaBtn.textContent = d.comingSoon ? '最新情報はInstagramで →' : d.bookingLabel + ' →';
  ctaBtn.href = d.comingSoon ? d.instagram : d.bookingUrl;
}

function buildHero(images){
  const slides = document.getElementById('hero-slides');
  const dots = document.getElementById('hero-dots');
  slides.innerHTML = ''; dots.innerHTML = '';
  images.forEach((img,i)=>{
    const s = document.createElement('div');
    s.className = 'hero-slide'+(i===0?' active':'');
    s.style.backgroundImage = `url('${img.file}')`;
    slides.appendChild(s);
    const d = document.createElement('div');
    d.className = 'hero-dot'+(i===0?' active':'');
    d.onclick = ()=>goSlide(i);
    dots.appendChild(d);
  });
  if(images.length>1){
    let idx=0;
    heroTimer = setInterval(()=>{
      const sl=slides.querySelectorAll('.hero-slide');
      const dt=dots.querySelectorAll('.hero-dot');
      sl[idx].classList.remove('active'); dt[idx].classList.remove('active');
      idx=(idx+1)%sl.length;
      sl[idx].classList.add('active'); dt[idx].classList.add('active');
    },5000);
  }
}
function goSlide(i){
  clearInterval(heroTimer);
  const sl=document.querySelectorAll('.hero-slide');
  const dt=document.querySelectorAll('.hero-dot');
  sl.forEach(s=>s.classList.remove('active'));
  dt.forEach(d=>d.classList.remove('active'));
  sl[i]?.classList.add('active'); dt[i]?.classList.add('active');
}

function filterGallery(cat, btn){
  if(btn){ document.querySelectorAll('.g-filter').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  document.querySelectorAll('.g-item').forEach(item=>{
    item.classList.toggle('hidden', cat!=='all' && item.dataset.cat!==cat);
  });
}

function openLb(idx){ lbIdx=idx; document.getElementById('lb-img').src=lbImages[lbIdx]; document.getElementById('lightbox').classList.add('open'); }
function openLbSrc(src){ lbIdx=-1; document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }
function lbNav(dir){ if(lbIdx<0) return; lbIdx=(lbIdx+dir+lbImages.length)%lbImages.length; document.getElementById('lb-img').src=lbImages[lbIdx]; }

function toggleQa(i){
  document.querySelectorAll('.qa-item')[i].classList.toggle('open');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowRight') lbNav(1);
  if(e.key==='ArrowLeft') lbNav(-1);
});
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeLb(); });

init();
</script>
